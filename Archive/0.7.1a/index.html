<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Axiom Terminal Archive | Infinite Hegemony v0.7.1a</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700;800&display=swap');

    :root {
      --bg-dark: #020202;
      --term-green: #10b981;
      --term-dark-green: #064e3b;
      --panel-bg: rgba(10, 12, 16, 0.85);
      --panel-border: rgba(16, 185, 129, 0.2);
    }

    body {
      margin: 0;
      background-color: var(--bg-dark);
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden; 
      user-select: none;
    }

    /* Immersive Visual Layers */
    .scanlines {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 3px 100%;
      z-index: 50; pointer-events: none; opacity: 0.6;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(to right, rgba(16, 185, 129, 0.03) 1px, transparent 1px), 
                        linear-gradient(to bottom, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -2;
    }

    .vignette {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(2,2,2,0.95) 100%);
      z-index: 40; pointer-events: none;
    }

    .hub-panel { 
      background: var(--panel-bg); 
      border: 1px solid var(--panel-border); 
      box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(16, 185, 129, 0.03);
      backdrop-filter: blur(12px);
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Navigation Active Styles */
    .active-tab {
      background: rgba(16, 185, 129, 0.1);
      border-left: 4px solid var(--term-green);
      color: var(--term-green);
      text-shadow: 0 0 10px rgba(16,185,129,0.5);
    }

    .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .text-glow { text-shadow: 0 0 12px rgba(16,185,129,0.6); }

    /* CRT Flicker for Boot Screen */
    .animate-flicker { animation: flicker 0.15s infinite; }
    @keyframes flicker {
      0% { opacity: 0.95; }
      50% { opacity: 0.85; }
      100% { opacity: 0.95; }
    }

    /* Terminal Cursor */
    .cursor-blink {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background-color: var(--term-green);
      animation: blink 1s step-end infinite;
      vertical-align: bottom;
      margin-left: 4px;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Custom Checkbox */
    .term-checkbox {
      appearance: none;
      width: 16px; height: 16px;
      border: 1px solid var(--term-green);
      background: transparent;
      outline: none; cursor: pointer;
      position: relative;
    }
    .term-checkbox:checked::after {
      content: '✓';
      position: absolute; top: -3px; left: 2px;
      color: var(--term-green); font-size: 14px;
    }
  </style>
  <style>
    .term-checkbox:checked::after {
      content: '\2713';
    }
  </style>
</head>
<body>

  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bg-grid"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const GAME_VERSION = '0.7.1a';
    const GAME_PATH = './v0.7.1a.html';
    const HUB_LABEL = 'Axiom Archive Hub';
    const CURRENT_HOME_PATH = '../../index.html';

    // --- IMMERSION LOCK / TERMINAL BOOT COMPONENT ---
    const TerminalBoot = ({ onComplete, fsPref, setFsPref }) => {
      // stages: 'prompt', 'click_init', 'booting'
      const [stage, setStage] = useState(fsPref !== 'none' ? 'click_init' : 'prompt');
      const [rememberMe, setRememberMe] = useState(false);
      const [bootLog, setBootLog] = useState([]);
      
      const fullBootSequence = [
        "> INITIALIZING NUG_HUB KERNEL...",
        "> MEMORY CHECK: OK (1024TB MULTIVERSAL RAM)",
        "> MOUNTING AXIOM SYNDICATE SIMULATION CORE...",
        `> FETCHING ARCHIVED BUILD: ${GAME_VERSION}`,
        "> VERIFYING TIME-CAPSULE HUB ROUTE...",
        "> LOADING ARCHIVED PRESENTATION LAYER...",
        "> CONNECTING BROADCAST LINK: @King_Nugget_AU... ESTABLISHED",
        "> SYNCHRONIZING SYSTEMIC PROGRESS ARCHIVES...",
        "> UPLINK SECURE.",
        "> ACCESS GRANTED."
      ];

      const executeBoot = async (useFullscreen) => {
        // Handle Fullscreen Request
        if (useFullscreen && !document.fullscreenElement) {
          await document.documentElement.requestFullscreen().catch(err => console.warn(err));
        }

        // Save preference if checkbox was ticked
        if (stage === 'prompt' && rememberMe) {
          const pref = useFullscreen ? 'full' : 'window';
          try { localStorage.setItem('nughub_fs_pref', pref); } catch (e) {}
          setFsPref(pref);
        }

        setStage('booting');

        // Typing effect for boot lines
        for (let i = 0; i < fullBootSequence.length; i++) {
          await new Promise(res => setTimeout(res, 400 + Math.random() * 500));
          setBootLog(prev => [...prev, fullBootSequence[i]]);
        }
        
        await new Promise(res => setTimeout(res, 800));
        onComplete();
      };

      return (
        <div className="fixed inset-0 z-[100] flex flex-col justify-end p-8 md:p-16 bg-black font-mono text-emerald-500">
          
          {/* Output Log */}
          <div className="flex-1 flex flex-col justify-end mb-8 overflow-hidden">
             {bootLog.map((line, i) => (
                <div key={i} className="text-sm md:text-lg mb-2 opacity-90 drop-shadow-[0_0_8px_rgba(16,185,129,0.8)]">
                  {line}
                </div>
             ))}
             {stage === 'booting' && (
                <div className="text-sm md:text-lg mt-2"><span className="cursor-blink"></span></div>
             )}
          </div>

          {/* Interactive Prompts */}
          {stage === 'prompt' && (
            <div className="border border-emerald-500/30 bg-emerald-900/10 p-6 md:p-8 rounded animate-flicker max-w-2xl">
              <h2 className="text-xl md:text-2xl font-bold mb-6 text-glow">SYSTEM ALERT: UPLINK CONFIGURATION</h2>
              <p className="mb-6 opacity-80 text-sm md:text-base">Optimal simulation immersion requires full sensory focus. Do you wish to initialize the terminal in FULLSCREEN mode?</p>
              
              <div className="flex items-center gap-3 mb-8">
                <input 
                  type="checkbox" 
                  id="remember" 
                  className="term-checkbox"
                  checked={rememberMe}
                  onChange={(e) => setRememberMe(e.target.checked)}
                />
                <label htmlFor="remember" className="cursor-pointer text-sm opacity-80 hover:opacity-100 transition-opacity">
                  SAVE PREFERENCE (Can be changed in dashboard)
                </label>
              </div>

              <div className="flex flex-col sm:flex-row gap-4">
                <button onClick={() => executeBoot(true)} className="flex-1 py-3 border border-emerald-500 text-emerald-500 hover:bg-emerald-500 hover:text-black font-bold tracking-widest transition-all">
                  [Y] INITIALIZE FULLSCREEN
                </button>
                <button onClick={() => executeBoot(false)} className="flex-1 py-3 border border-emerald-500/30 text-emerald-500/70 hover:bg-emerald-500/20 hover:text-emerald-400 font-bold tracking-widest transition-all">
                  [N] PROCEED IN WINDOW
                </button>
              </div>
            </div>
          )}

          {stage === 'click_init' && (
            <div 
              onClick={() => executeBoot(fsPref === 'full')}
              className="absolute inset-0 flex items-center justify-center cursor-pointer group"
            >
              <div className="text-center animate-flicker">
                <i className="fa-solid fa-power-off text-5xl mb-6 drop-shadow-[0_0_15px_rgba(16,185,129,0.8)] group-hover:scale-110 transition-transform"></i>
                <h1 className="text-2xl md:text-4xl font-black uppercase tracking-[0.3em] text-glow mb-4">
                  CLICK TO INITIALIZE
                </h1>
                <p className="opacity-50 text-xs tracking-widest">
                  [{fsPref === 'full' ? 'FULLSCREEN' : 'WINDOWED'} MODE PRE-CONFIGURED]
                </p>
              </div>
            </div>
          )}

        </div>
      );
    };

    // --- LIVE CLOCK COMPONENT ---
    const SystemClock = () => {
      const [time, setTime] = useState(new Date());
      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);
      
      return (
        <div className="flex items-center gap-3 text-xs text-emerald-500/80 font-mono bg-black/50 px-4 py-2 rounded border border-emerald-500/20">
          <i className="fa-regular fa-clock"></i>
          <span>{time.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
          <span className="font-bold text-emerald-400">{time.toLocaleTimeString('en-US', { hour12: false })}</span>
        </div>
      );
    };

    // --- MAIN APP COMPONENT ---
    function App() {
      // LocalStorage init safely
      const getInitialFsPref = () => {
        try { return localStorage.getItem('nughub_fs_pref') || 'none'; } 
        catch (e) { return 'none'; }
      };

      const [isUnlocked, setIsUnlocked] = useState(false);
      const [fsPref, setFsPref] = useState(getInitialFsPref);
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');

      const tabs = [
        { id: 'dashboard', icon: 'fa-server', label: 'Dashboard' },
        { id: 'axiom', icon: 'fa-network-wired', label: 'Axiom Syndicate' },
        { id: 'about', icon: 'fa-user-astronaut', label: 'About Me' },
        { id: 'archive', icon: 'fa-folder-open', label: 'Project Archive' }
      ];

      // Fullscreen Event Listener
      useEffect(() => {
        const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }, []);

      const toggleFullscreen = async () => {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen().catch(err => console.warn(err));
        } else {
          await document.exitFullscreen().catch(err => console.warn(err));
        }
      };

      const toggleFsPreference = () => {
        const newPref = fsPref === 'full' ? 'window' : 'full';
        try { localStorage.setItem('nughub_fs_pref', newPref); } catch (e) {}
        setFsPref(newPref);
      };

      const launchGame = async (preferFullscreen = fsPref === 'full') => {
        try {
          sessionStorage.setItem('axiom_launch_target', GAME_PATH);
          sessionStorage.setItem('axiom_launch_fullscreen', preferFullscreen ? '1' : '0');
          sessionStorage.setItem('axiom_launch_version', GAME_VERSION);
        } catch (e) {}

        if (preferFullscreen && !document.fullscreenElement) {
          try { await document.documentElement.requestFullscreen(); } catch (e) {}
        }

        window.location.href = GAME_PATH;
      };

      const goToCurrentHub = async (preferFullscreen = fsPref === 'full') => {
        try {
          sessionStorage.setItem('axiom_launch_fullscreen', preferFullscreen ? '1' : '0');
        } catch (e) {}

        if (preferFullscreen && !document.fullscreenElement) {
          try { await document.documentElement.requestFullscreen(); } catch (e) {}
        }

        window.location.href = CURRENT_HOME_PATH;
      };

      // Tab Content Render
      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard': 
            return (
              <div className="animate-fade flex flex-col justify-center h-full max-w-4xl overflow-y-auto no-scrollbar pb-10">
                <div className="mb-6 inline-flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/30 rounded text-[10px] text-emerald-500 uppercase tracking-widest self-start">
                  <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                  Connection Secure
                </div>
                
                <h1 className="text-5xl lg:text-7xl font-black uppercase tracking-tight text-white mb-6 leading-none text-glow shrink-0">
                  Welcome to <br/><span className="text-emerald-500">{HUB_LABEL}</span>
                </h1>
                
                <div className="space-y-6 text-sm md:text-base text-slate-400 font-mono leading-relaxed max-w-2xl shrink-0">
                  <p>
                    This archived terminal preserves the earlier public presentation for Infinite Hegemony so players can revisit the project at this exact stage of development.
                  </p>
                  <p>
                    This snapshot keeps the older hub style and launches the matching archived build instead of redirecting into the latest branch.
                  </p>
                </div>

                {/* Main Call to Action for Game */}
                <div className="mt-8 bg-black/60 border border-emerald-500/40 p-6 rounded-xl flex flex-col md:flex-row items-center justify-between gap-6 shadow-[inset_0_0_20px_rgba(16,185,129,0.1)] shrink-0">
                  <div className="text-center md:text-left">
                    <h3 className="text-emerald-400 font-bold uppercase tracking-widest text-lg mb-1 flex items-center justify-center md:justify-start gap-2">
                       Axiom Syndicate <span className="text-xs bg-emerald-500/20 px-2 py-0.5 rounded border border-emerald-500/50">{GAME_VERSION}</span>
                    </h3>
                    <p className="text-slate-400 font-mono text-xs md:text-sm mt-2 max-w-md">
                      This archived hub now points directly to <span className="text-emerald-300">{GAME_PATH}</span>, so the version you enter from here matches the period this hub represents.
                    </p>
                  </div>
                  <button onClick={() => launchGame(fsPref === 'full')} className="shrink-0 w-full md:w-auto px-8 py-4 bg-emerald-600/20 border border-emerald-500 rounded text-emerald-400 font-bold hover:bg-emerald-500 hover:text-black transition-all uppercase tracking-widest text-sm shadow-[0_0_15px_rgba(16,185,129,0.2)] hover:shadow-[0_0_30px_rgba(16,185,129,0.6)] flex items-center justify-center gap-3 group">
                    <i className="fa-solid fa-globe group-hover:animate-pulse text-lg"></i> Click to Play
                  </button>
                </div>

                <div className="mt-10 grid grid-cols-2 md:grid-cols-4 gap-4 shrink-0">
                  <div className="bg-black/50 border border-white/5 p-4 rounded-lg text-center shadow-[inset_0_0_15px_rgba(0,0,0,0.5)] hover:border-emerald-500/30 transition-colors">
                    <i className="fa-solid fa-code-commit text-emerald-500 mb-2 text-xl"></i>
                    <div className="text-[10px] text-slate-500 uppercase tracking-widest">Status</div>
                    <div className="text-white font-bold text-xs uppercase">Active Dev</div>
                  </div>
                  <div className="bg-black/50 border border-white/5 p-4 rounded-lg text-center shadow-[inset_0_0_15px_rgba(0,0,0,0.5)] hover:border-emerald-500/30 transition-colors">
                    <i className="fa-solid fa-microchip text-emerald-500 mb-2 text-xl"></i>
                    <div className="text-[10px] text-slate-500 uppercase tracking-widest">Framework</div>
                    <div className="text-white font-bold text-xs uppercase">React 18 + TW</div>
                  </div>
                  <div className="bg-black/50 border border-white/5 p-4 rounded-lg text-center shadow-[inset_0_0_15px_rgba(0,0,0,0.5)] hover:border-emerald-500/30 transition-colors">
                    <i className="fa-solid fa-headphones text-emerald-500 mb-2 text-xl"></i>
                    <div className="text-[10px] text-slate-500 uppercase tracking-widest">Audio</div>
                    <div className="text-white font-bold text-xs uppercase">Pipeline</div>
                  </div>
                </div>
              </div>
            );

          case 'axiom': 
            return (
              <div className="animate-fade h-full flex flex-col max-w-5xl mx-auto w-full pt-4 md:pt-10 overflow-y-auto no-scrollbar">
                <div className="flex items-center gap-6 mb-8 border-b border-emerald-500/20 pb-6 shrink-0">
                    <i className="fa-solid fa-fingerprint text-6xl md:text-8xl text-emerald-500 drop-shadow-[0_0_20px_rgba(16,185,129,0.4)]"></i>
                    <div>
                        <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-widest text-glow mb-2">Axiom Syndicate</h2>
                        <p className="text-emerald-500 font-mono text-sm tracking-widest uppercase">Infinite Hegemony :: {GAME_VERSION} Archive Snapshot</p>
                    </div>
                </div>
                
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 pb-10">
                    {/* Lore & Objective */}
                    <div className="lg:col-span-2 space-y-6">
                        <div className="bg-black/60 border border-emerald-500/20 p-6 rounded-xl">
                            <h3 className="text-emerald-400 font-bold uppercase tracking-widest mb-4 text-sm flex items-center gap-2 border-b border-emerald-500/20 pb-2">
                                <i className="fa-solid fa-book-journal-whills"></i> Operation Briefing & Instructions
                            </h3>
                            <p className="text-slate-300 font-mono text-sm leading-relaxed mb-4">
                                You are a low-level operative thrust into a dystopian corporate ladder. Your objective is absolute market domination. Start from a humble street-side operation and relentlessly expand your influence to build a Multiversal Monopoly.
                            </p>
                            
                            <ul className="list-disc pl-5 text-slate-300 font-mono text-sm space-y-3 mb-6">
                                <li><strong className="text-emerald-500">Manual Operations:</strong> Tap the central globe interface rapidly to harvest initial user data and seed capital.</li>
                                <li><strong className="text-emerald-500">Automated Infrastructure:</strong> Use capital to acquire servers, subroutines, and corporate shells. These assets generate continuous passive yields, scaling your income automatically.</li>
                                <li><strong className="text-emerald-500">Market Manipulation:</strong> Reinvest heavily into structural upgrades. Upgrades multiply your systemic reach and unlock new tiers of automation.</li>
                                <li><strong className="text-emerald-500">Multiversal Paradigm (Prestige):</strong> Reaching the highest echelons requires a systemic reset. Execute prestige buyouts to reset local progress in exchange for permanent, game-changing multiversal multipliers. This simulation is a marathon.</li>
                            </ul>

                            <div className="bg-red-900/10 border border-red-500/30 p-3 rounded text-red-400 font-mono text-xs">
                                <strong>WARNING:</strong> This incremental system is designed for long-term progression. Reaching absolute systemic dominance will require significant time and strategic resource allocation.
                            </div>
                        </div>

                        <div className="bg-emerald-900/10 border border-emerald-500/30 p-6 rounded-xl flex items-center justify-between shadow-[inset_0_0_30px_rgba(16,185,129,0.05)]">
                            <div>
                                <h3 className="text-white font-bold uppercase tracking-widest mb-1 text-sm">Local Progress Archiving</h3>
                                <p className="text-slate-400 font-mono text-xs max-w-sm">All capital and corporate holdings are securely saved locally to your device. You may disconnect and return without loss of systemic dominance.</p>
                            </div>
                            <i className="fa-solid fa-hard-drive text-3xl text-emerald-500 opacity-50 ml-4 hidden sm:block"></i>
                        </div>
                    </div>

                    {/* Launch Panel */}
                    <div className="flex flex-col gap-4">
                        <div className="bg-black/80 border border-emerald-500/30 p-6 rounded-xl flex-1 flex flex-col justify-center items-center text-center shadow-[inset_0_0_40px_rgba(0,0,0,0.8)] relative overflow-hidden group">
                            
                            {/* Decorative scanline specific to this box */}
                            <div className="absolute inset-0 bg-[linear-gradient(rgba(16,185,129,0.1)_1px,transparent_1px)] bg-[size:100%_4px] opacity-20 pointer-events-none"></div>

                            <i className="fa-solid fa-satellite-dish text-5xl text-emerald-500/50 mb-6 group-hover:text-emerald-400 transition-colors duration-500"></i>
                            <h4 className="text-white font-bold uppercase tracking-widest mb-2 z-10 text-glow">Uplink Ready</h4>
                            <p className="text-xs text-slate-400 font-mono mb-8 z-10 px-4">Simulation payload compiled. Press the globe interface below to establish connection.</p>
                            
                            {/* Launch Button */}
                            <button onClick={() => launchGame(fsPref === 'full')} className="z-10 w-full py-5 bg-emerald-600/20 border border-emerald-500 rounded text-emerald-400 font-bold hover:bg-emerald-500 hover:text-black transition-all uppercase tracking-widest text-sm shadow-[0_0_15px_rgba(16,185,129,0.2)] hover:shadow-[0_0_30px_rgba(16,185,129,0.6)] flex items-center justify-center gap-3">
                                <i className="fa-solid fa-globe text-xl group-hover:animate-spin"></i> Initialize
                            </button>
                        </div>
                    </div>
                </div>
              </div>
            );

          case 'about':
            return (
              <div className="animate-fade h-full flex flex-col max-w-5xl mx-auto w-full pt-4 md:pt-10 overflow-y-auto no-scrollbar">
                <div className="flex flex-col md:flex-row md:items-center gap-6 mb-8 border-b border-emerald-500/20 pb-6 shrink-0">
                    <i className="fa-brands fa-youtube text-6xl md:text-8xl text-red-600 drop-shadow-[0_0_20px_rgba(220,38,38,0.4)]"></i>
                    <div>
                        <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-widest text-glow mb-2">Developer Profile</h2>
                        <a href="https://www.youtube.com/@King_Nugget_AU" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 text-emerald-500 hover:text-emerald-400 font-mono text-sm tracking-widest uppercase transition-colors bg-emerald-500/10 px-3 py-1 rounded border border-emerald-500/30">
                          @King_Nugget_AU <i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                        </a>
                    </div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-10">
                    {/* Game Philosophy */}
                    <div className="bg-black/60 border border-emerald-500/20 p-6 rounded-xl flex flex-col gap-4">
                        <h3 className="text-emerald-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                            <i className="fa-solid fa-gamepad"></i> Game Design Philosophy
                        </h3>
                        <p className="text-slate-300 font-mono text-sm leading-relaxed">
                            Axiom Syndicate represents my journey into learning basic game development. It was born out of a profound frustration with the modern idle and mobile gaming market.
                        </p>
                        <p className="text-slate-300 font-mono text-sm leading-relaxed">
                            My goal is to set a new standard for pacing. Idle games should be slower and significantly more involved. I am building a true marathon—a systemic progression meant to be played over months, completely discarding the shallow loop that lasts a week tops just to milk the user for ad views and microtransactions.
                        </p>
                    </div>

                    {/* Audio & Foley */}
                    <div className="bg-black/60 border border-emerald-500/20 p-6 rounded-xl flex flex-col gap-4">
                        <h3 className="text-emerald-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                            <i className="fa-solid fa-microphone-lines"></i> Audio & Foley Production
                        </h3>
                        <p className="text-slate-300 font-mono text-sm leading-relaxed">
                            Beyond standard web development and coding, I am deeply invested in exploring immersive audio landscapes. 
                        </p>
                        <p className="text-slate-300 font-mono text-sm leading-relaxed">
                            I currently have several unreleased projects centered around custom foley recording. These projects are partially recorded and remain in the pipeline, with the ultimate aim of bringing high-fidelity, handcrafted auditory experiences to my interactive media.
                        </p>
                    </div>
                    
                    {/* Channel Broadcaster */}
                    <div className="md:col-span-2 bg-emerald-900/10 border border-emerald-500/30 p-6 md:p-8 rounded-xl flex flex-col md:flex-row items-center gap-6 shadow-[inset_0_0_30px_rgba(16,185,129,0.05)]">
                        <i className="fa-solid fa-video text-5xl text-emerald-500/50"></i>
                        <div className="text-center md:text-left">
                            <h3 className="text-white font-bold uppercase tracking-widest mb-2 text-base">Content Broadcasting Network</h3>
                            <p className="text-slate-400 font-mono text-sm leading-relaxed max-w-3xl">
                                Progress on the idle engine, technical devlogs, and future audio/foley experiments will be documented and broadcasted. Navigate to the primary YouTube channel link above to monitor network updates and follow the independent development journey.
                            </p>
                        </div>
                    </div>
                </div>
              </div>
            );

          case 'archive':
            return (
              <div className="animate-fade h-full flex flex-col justify-center items-center text-center max-w-2xl mx-auto">
                <i className="fa-solid fa-folder-tree text-6xl text-slate-700 mb-6 drop-shadow-[0_0_15px_rgba(0,0,0,0.8)]"></i>
                <h2 className="text-2xl font-bold text-slate-500 uppercase tracking-widest">Project Archive</h2>
                <div className="mt-4 p-4 border border-white/5 bg-black/50 rounded-lg">
                    <p className="text-slate-500 text-xs font-mono leading-relaxed">
                      // DIRECTORY EMPTY <br/><br/>
                      No legacy projects available for review at this time. Future retired simulations, deprecated mechanics, and archived foley files will be securely stored here.
                    </p>
                </div>
              </div>
            );

          default: 
            return null;
        }
      };

      if (!isUnlocked) {
        return <TerminalBoot onComplete={() => setIsUnlocked(true)} fsPref={fsPref} setFsPref={setFsPref} />;
      }

      return (
        <div className="flex flex-col h-screen p-4 lg:p-6 max-w-[1600px] mx-auto relative z-10 animate-fade">
          
          {/* HEADER LAYER */}
          <header className="mb-6 px-2 flex justify-between items-center shrink-0">
             <div className="flex items-center gap-4">
               <div className="font-black tracking-[0.4em] uppercase text-xl text-white text-glow">
                  ARCHIVE<span className="text-emerald-500">_</span>0.7.1A
               </div>
             </div>
             
             {/* Sub-Header Widgets */}
             <div className="flex items-center gap-4">
               <SystemClock />
               <button
                 onClick={() => goToCurrentHub(fsPref === 'full')}
                 className="px-3 h-10 rounded bg-black/50 border border-cyan-400/20 text-cyan-300 hover:bg-cyan-300 hover:text-black transition-colors flex items-center justify-center gap-2 text-[10px] uppercase tracking-widest font-bold">
                 <i className="fa-solid fa-house"></i> Current Hub
               </button>
                <button 
                  onClick={toggleFullscreen}
                  className="w-10 h-10 rounded bg-black/50 border border-emerald-500/20 text-emerald-500 hover:bg-emerald-500 hover:text-black transition-colors flex items-center justify-center">
                  <i className={`fa-solid ${isFullscreen ? 'fa-compress' : 'fa-expand'}`}></i>
                </button>
             </div>
          </header>

          {/* MAIN LAYOUT */}
          <div className="flex flex-col lg:flex-row gap-6 flex-1 min-h-0">
            
            {/* SIDEBAR NAVIGATION */}
            <aside className="w-full lg:w-64 shrink-0 flex flex-col gap-2">
              <nav className="flex flex-row lg:flex-col gap-2 overflow-x-auto no-scrollbar pb-2 lg:pb-0">
                {tabs.map(tab => (
                  <button 
                    key={tab.id} 
                    onClick={() => setActiveTab(tab.id)} 
                    className={`flex items-center gap-4 px-5 py-4 rounded-lg text-[11px] font-bold uppercase tracking-widest transition-all shrink-0 ${activeTab === tab.id ? 'active-tab' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5 border-l-4 border-transparent'}`}>
                    <i className={`fa-solid ${tab.icon} w-4 text-center`}></i> {tab.label}
                  </button>
                ))}
              </nav>
              
              <div className="mt-auto hidden lg:block space-y-4">
                
                {/* Auto Fullscreen Toggle */}
                <div className="p-3 border border-white/5 rounded-xl bg-black/40 flex items-center justify-between group cursor-pointer hover:border-emerald-500/30 transition-colors" onClick={toggleFsPreference}>
                   <div className="flex flex-col">
                     <span className="text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-1">Boot Override</span>
                     <span className="text-xs font-bold text-slate-300">Auto-Fullscreen</span>
                   </div>
                   <div className={`w-8 h-4 rounded-full relative transition-colors ${fsPref === 'full' ? 'bg-emerald-500' : 'bg-slate-700'}`}>
                      <div className={`absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full transition-transform ${fsPref === 'full' ? 'translate-x-4' : 'translate-x-0'}`}></div>
                   </div>
                </div>

                {/* Network Status */}
                <div className="p-4 border border-white/5 rounded-xl bg-black/40 text-center">
                  <div className="text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-2">Network Uplink</div>
                  <div className="flex items-center justify-center gap-2 text-emerald-500 text-xs font-bold">
                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                    STABLE
                  </div>
                </div>
              </div>
            </aside>

            {/* CONTENT AREA */}
            <main className="flex-1 hub-panel rounded-2xl p-6 lg:p-12 relative flex flex-col h-full overflow-hidden">
              {renderContent()}
            </main>
          </div>

          {/* PROFESSIONAL FOOTER */}
          <footer className="mt-6 border-t border-white/5 pt-4 flex flex-col md:flex-row justify-between items-center px-4 text-[10px] font-mono text-slate-500 uppercase tracking-widest shrink-0 gap-4">
            <div className="flex items-center gap-3 text-emerald-500/50">
               <i className="fa-brands fa-github text-sm"></i>
               <span>King_Nugget_AU // Centralized Codebase</span>
            </div>
            <div className="flex gap-6">
                <span>Est. 2026</span>
                <span className="hidden md:inline">|</span>
                <span>All Systems Nominal</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
