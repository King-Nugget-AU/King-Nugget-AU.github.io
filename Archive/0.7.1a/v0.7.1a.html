      if (num === 0 || !num || isNaN(num) || !isFinite(num)) return "0";
      const isNeg = num < 0;
      const absNum = Math.abs(num);
      let result = "";
      if (absNum < 1000) result = (absNum % 1 !== 0) ? absNum.toFixed(1) : Math.floor(absNum).toString();
      else if (notation === 'scientific' || absNum >= 1e63) {
        result = absNum.toExponential(2).replace('e+', 'e');
      } else {
        const suffixes = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td", "Qad", "Qid", "Sxd", "Spd", "Ocd", "Nod", "V"];
        const suffixNum = Math.floor(Math.log10(absNum) / 3);
        let shortValue = absNum / Math.pow(10, suffixNum * 3);
        result = shortValue.toFixed(2) + suffixes[suffixNum];
      }
      return (isNeg ? "-" : "") + result;
    };

        buyMultiplier: 1, lastTick: Date.now(),
        marketBoom: null, monopolyBuff: { active: false, expiresAt: 0, mult: 1 }
      });

      const stateRef = useRef(gameState);
      useEffect(() => { stateRef.current = gameState; }, [gameState]);

      const [finances, setFinances] = useState({ gross: 0, upkeep: 0, profit: 0, taxRate: 0, taxAmount: 0, net: 0, dataRate: 0, isBankrupt: false, dilation: 1, backlog: 0, logCap: 50, logSpeed: 2, isStalled: false, hypeBoost: 1 });
      const [isResearching, setIsResearching] = useState(false);
      const [saveNotice, setSaveNotice] = useState("");
      const [mobileTab, setMobileTab] = useState('desk');
      const [strategyTab, setStrategyTab] = useState('stats');
      const [offlineReport, setOfflineReport] = useState(null);
      const [modalState, setModalState] = useState(null); 
      
      // FIXED: ImportRef was missing, causing settings tab to crash
      const importRef = useRef(null);
      const clickContainerRef = useRef(null);
      const lastSaveTime = useRef(Date.now());
      const hasProcessedOffline = useRef(false);

      const initiateConnection = async () => {
        try { if (!document.fullscreenElement) await document.documentElement.requestFullscreen(); } catch (err) {}
        setPreBoot(false);
      };

      const toggleFullscreen = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen();
        }
      };

      useEffect(() => {
        const handleFSChange = () => setIsFullscreen(!!document.fullscreenElement);
        document.addEventListener('fullscreenchange', handleFSChange);
        return () => document.removeEventListener('fullscreenchange', handleFSChange);
      }, []);

      useEffect(() => {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setGameState(prev => ({ 
              ...prev, ...parsed, 
              departmentRegistry: { ...INITIAL_DEPARTMENTS, ...(parsed.departmentRegistry || {}) },
              policyRegistry: { ...INITIAL_POLICIES, ...(parsed.policyRegistry || {}) },
              prestigeRegistry: { ...PRESTIGE_UPGRADES, ...(parsed.prestigeRegistry || {}) },
              departments: { ...Object.keys(INITIAL_DEPARTMENTS).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}), ...(parsed.departments || {}) },
              policies: { ...Object.keys(INITIAL_POLICIES).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}), ...(parsed.policies || {}) },
              prestigeUpgrades: { ...Object.keys(PRESTIGE_UPGRADES).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}), ...(parsed.prestigeUpgrades || {}) },
              stats: { ...prev.stats, ...(parsed.stats || {}) },
              settings: { ...prev.settings, ...(parsed.settings || {}) },
              floatingTexts: [], // Prevent dead elements on load
              monopolyBuff: parsed.monopolyBuff && parsed.monopolyBuff.expiresAt > Date.now() ? parsed.monopolyBuff : { active: false, expiresAt: 0, mult: 1 },
              runCapital: parsed.runCapital !== undefined ? parsed.runCapital : (parsed.lifetimeCapital || 0),
              lastTick: parsed.lastTick || Date.now()
            }));
          } catch (e) { console.error("Failed to load save", e); }
        } else {
            hasProcessedOffline.current = true;
        }
      }, []);

      const saveGame = useCallback((manual = false) => {
        const stateToSave = { ...stateRef.current, lastTick: Date.now(), floatingTexts: [] };
        localStorage.setItem(SAVE_KEY, JSON.stringify(stateToSave));
        lastSaveTime.current = Date.now();
        if (manual) showToast("System Synchronized.");
      }, []);

      const showToast = (msg) => { setSaveNotice(msg); setTimeout(() => setSaveNotice(""), 2000); };

      const calcEffect = useCallback((registry, levels, type, isAdd = false) => {
          return Object.entries(registry).reduce((acc, [key, upg]) => {
              if (upg.effectType === type) return isAdd ? acc + ((levels[key]||0)*upg.effectBase) : acc * Math.pow(1+upg.effectBase, levels[key]||0); 
              return acc;
          }, isAdd ? 0 : 1);
      }, []);

      const evaluateDepartment = useCallback((dep, amount, currentState) => {
          if (!amount) return { gross: 0, upkeep: 0, data: 0 };
          
          const mBoost = getMilestoneBoost(amount);
          const rBoost = getRankInfo(currentState.lifetimeCapital).current.mult;
          const eqBoost = calcEffect(currentState.prestigeRegistry, currentState.prestigeUpgrades, 'global_mult', false);
          const dBoost = applyDilation(1 + (Math.sqrt(currentState.data) * 0.01));
          const capMult = calcEffect(currentState.policyRegistry, currentState.policies, 'capital_mult', false);
          const dataPolEff = calcEffect(currentState.policyRegistry, currentState.policies, 'data_mult', false);
          
          let upkReduc = calcEffect(currentState.policyRegistry, currentState.policies, 'upkeep_reduction', true);
          const actualUpkeepRate = Math.max(0.1, 1 - upkReduc);

          let totalMult = eqBoost * rBoost * mBoost;
          totalMult = applyDilation(totalMult); // Master Dilation

          if (dep.type === 'capital') {
              return { 
                gross: amount * dep.baseProd * totalMult * dBoost * capMult, 
                upkeep: amount * (dep.baseUpkeep || 0) * actualUpkeepRate, 
                data: 0 
              };
          } else {
              return { 
                gross: 0, upkeep: 0, 
                data: amount * dep.baseProd * totalMult * dataPolEff 
              };
          }
      }, [calcEffect]);

      // Core Game Loop
      useEffect(() => {
        let animationFrameId;
        const gameLoop = () => {
          const now = Date.now();
          if (preBoot) {
              animationFrameId = requestAnimationFrame(gameLoop);
              return;
          }

          setGameState(prev => {
            const deltaMs = now - prev.lastTick;
            if (deltaMs < 50) return prev; 
            
            let rawTimeBoost = calcEffect(prev.prestigeRegistry, prev.prestigeUpgrades, 'time_warp', false);
            const timeBoost = applyDilation(rawTimeBoost);

            let realDeltaSec = Math.min(deltaMs, 2592000000) / 1000;
            let deltaSec = realDeltaSec * timeBoost;
            
            const newState = { ...prev, lastTick: now };
            newState.stats.timePlayed += realDeltaSec;
            newState.totalTime += realDeltaSec / 86400; // 1 real day = 1 game day

            // Cleanup floating texts
            newState.floatingTexts = newState.floatingTexts.filter(ft => ft.expires > now);
            
            let totalGross = 0, totalUpkeep = 0, totalData = calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'base_data', true);
            
            Object.keys(newState.departmentRegistry).forEach(key => {
                const dep = newState.departmentRegistry[key];
                const amount = newState.departments[key] || 0;
                if (amount > 0) {
                    const evalRes = evaluateDepartment(dep, amount, newState);
                    totalGross += evalRes.gross;
                    totalUpkeep += evalRes.upkeep;
                    totalData += evalRes.data;
                }
            });

            if (newState.monopolyBuff.active && now > newState.monopolyBuff.expiresAt) newState.monopolyBuff = { active: false, expiresAt: 0, mult: 1 };
            const activeMonopolyMult = newState.monopolyBuff.active ? newState.monopolyBuff.mult : 1;
            
            totalGross *= activeMonopolyMult;
            totalData *= activeMonopolyMult;

            // ---- LOGISTICS & HYPE CALCULATIONS ----
            let logCapMult = calcEffect(newState.policyRegistry, newState.policies, 'log_capacity', false);
            let logSpeedMult = calcEffect(newState.policyRegistry, newState.policies, 'log_speed', false);
            
            let baseLogCap = applyDilation(50 * logCapMult);
            let baseLogSpeed = applyDilation(2 * logSpeedMult);
            let logPressure = totalGross * 0.25;

            newState.backlog = safeAdd(newState.backlog, (logPressure * deltaSec) - (baseLogSpeed * deltaSec));
            if (newState.backlog < 0) newState.backlog = 0;

            const isStalled = newState.backlog >= baseLogCap;
            const latencyPenalty = isStalled ? 0.5 : 1.0;

            newState.hype = Math.max(0, newState.hype - (0.15 * deltaSec));
            const hypeBoost = 1 + (newState.hype * 0.25);

            totalGross = totalGross * hypeBoost * latencyPenalty;
            // -----------------------------------------

            const profitBeforeTax = totalGross - totalUpkeep;
            let effectiveTaxRate = 0;
            
            if (profitBeforeTax > 0) {
                for (let i = TAX_BRACKETS.length - 1; i >= 0; i--) {
                    if (profitBeforeTax >= TAX_BRACKETS[i].threshold) {
                        effectiveTaxRate = TAX_BRACKETS[i].rate;
                        break;
                    }
                }
            }
            
            const evasionDrop = calcEffect(newState.policyRegistry, newState.policies, 'tax_reduction', true) + calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'tax_reduction', true);
            effectiveTaxRate = Math.max(0, effectiveTaxRate - evasionDrop);

            const taxAmount = profitBeforeTax > 0 ? profitBeforeTax * effectiveTaxRate : 0;
            const netCapitalRate = totalGross - totalUpkeep - taxAmount;
            
            const isBankrupt = newState.capital <= 0 && netCapitalRate < 0;
            if (isBankrupt) { 
                newState.capital = 0; 
                totalData = 0; 
            }
            
            const autoClicks = calcEffect(newState.policyRegistry, newState.policies, 'auto_click', true);
            let autoGain = 0;
            if (autoClicks > 0 && !isBankrupt) {
                const basePower = calcEffect(newState.policyRegistry, newState.policies, 'click_power', true);
                const clickSynergy = calcEffect(newState.policyRegistry, newState.policies, 'click_synergy', true);
                const eqBoost = applyDilation(calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'global_mult', false));
                autoGain = ((0.5 + basePower + (totalGross * clickSynergy)) * eqBoost * activeMonopolyMult * hypeBoost) * autoClicks;
            }

            setFinances({
                gross: totalGross, upkeep: totalUpkeep, profit: profitBeforeTax, 
                taxRate: effectiveTaxRate, taxAmount, net: netCapitalRate, 
                dataRate: totalData, isBankrupt, dilation: applyDilation(1e25) / 1e25,
                backlog: newState.backlog, logCap: baseLogCap, logSpeed: baseLogSpeed,
                isStalled, hypeBoost
            });

            const tickNet = netCapitalRate * deltaSec;
            const tickAuto = autoGain * deltaSec;
            const totalCapChange = tickNet + tickAuto;
            
            if (!hasProcessedOffline.current) {
                hasProcessedOffline.current = true;
                if (deltaSec > 60 && (totalCapChange !== 0 || totalData > 0)) setOfflineReport({ time: deltaSec, capital: totalCapChange, data: totalData * deltaSec });
            }

            if (totalCapChange !== 0) { 
                newState.capital = safeAdd(newState.capital, totalCapChange); 
                if (newState.capital < 0) newState.capital = 0; 
                if (totalCapChange > 0) {
                    newState.lifetimeCapital = safeAdd(newState.lifetimeCapital, totalCapChange); 
                    newState.runCapital = safeAdd(newState.runCapital, totalCapChange); 
                }
            }

            if (totalData > 0 && !isBankrupt) newState.data = safeAdd(newState.data, totalData * deltaSec);
            
            if (!newState.marketBoom && Math.random() < (0.005 * deltaSec) && !isBankrupt) { 
              const r = Math.random();
              newState.marketBoom = { 
                x: Math.floor(Math.random() * 80) + 10, y: Math.floor(Math.random() * 80) + 10, 
                expiresAt: now + 15000, type: r > 0.90 && newState.data > 0 ? 'monopoly' : r > 0.65 && newState.data > 0 ? 'data' : 'cash' 
              };
            }
            if (newState.marketBoom && now > newState.marketBoom.expiresAt) newState.marketBoom = null;
            
            if (newState.policies.aiManager > 0 && newState.settings.aiManagerOn && !isBankrupt && Math.random() < (0.5 * deltaSec)) {
               const drift = newState.prestigeUpgrades.bailouts || 0;
               let bestBuy = null;
               Object.keys(newState.departmentRegistry).forEach(key => {
                   const dep = newState.departmentRegistry[key];
                   const count = newState.departments[key] || 0;
                   const cost = calculateCost(dep.baseCost, dep.costMult, count, 1, drift);
                   const testEval = evaluateDepartment(dep, count + 1, newState);
                   const isSafe = (totalUpkeep + testEval.upkeep) < (totalGross * 0.8) || dep.type === 'data';
                   if (newState.capital >= cost && isSafe) { if (!bestBuy || cost > bestBuy.cost) bestBuy = { key, cost }; }
               });
               if (bestBuy) { newState.capital -= bestBuy.cost; newState.departments[bestBuy.key] = (newState.departments[bestBuy.key] || 0) + 1; }
            }

            if (now - lastSaveTime.current > 10000) {
               localStorage.setItem(SAVE_KEY, JSON.stringify({...newState, floatingTexts: []}));
               lastSaveTime.current = now;
            }

            return newState;
          });
          animationFrameId = requestAnimationFrame(gameLoop);
        };
        animationFrameId = requestAnimationFrame(gameLoop);
        return () => cancelAnimationFrame(animationFrameId);
      }, [calcEffect, evaluateDepartment, preBoot]);

      // Calendar Formatting
      const calendar = useMemo(() => {
        const days = Math.floor(gameState.totalTime);
        const year = Math.floor(days / 365) + 1;
        const dayOfYear = (days % 365) + 1;
        
        const totalSeconds = gameState.totalTime * 86400;
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = Math.floor(totalSeconds % 60);
        
        return { year, dayOfYear, hours, minutes, seconds };
      }, [gameState.totalTime]);

      const triggerBuyAction = useCallback((type, key) => {
        setGameState(prev => {
          let cost, canAfford = false, amountToBuy = prev.buyMultiplier;
          const drift = prev.prestigeUpgrades.bailouts || 0;
          let nextState = { ...prev };
          
          if (type === 'department') {
            const dep = prev.departmentRegistry[key];
            const currentLevel = prev.departments[key] || 0;
            const currency = prev.capital; 
            if (amountToBuy === -1) amountToBuy = calculateMaxAffordable(dep.baseCost, dep.costMult, currentLevel, currency, drift);
            if (amountToBuy <= 0) return prev;
            cost = calculateCost(dep.baseCost, dep.costMult, currentLevel, amountToBuy, drift);
            canAfford = currency >= cost;
            if (canAfford) {
              nextState.capital = prev.capital - cost;
              nextState.departments = { ...prev.departments, [key]: currentLevel + amountToBuy };
            }
          } else {
            const isPrestige = type === 'prestige';
            const upgDef = isPrestige ? prev.prestigeRegistry[key] : prev.policyRegistry[key];
            const currentLevel = isPrestige ? (prev.prestigeUpgrades[key] || 0) : (prev.policies[key] || 0);
            cost = calculateCost(isPrestige ? upgDef.cost : upgDef.baseCost, upgDef.costMult, currentLevel, 1, isPrestige ? 0 : drift);
            canAfford = (isPrestige ? prev.equity : prev.capital) >= cost;
            if (canAfford) {
              nextState.capital = isPrestige ? prev.capital : prev.capital - cost;
              nextState.equity = isPrestige ? prev.equity - cost : prev.equity;
              if (isPrestige) nextState.prestigeUpgrades = { ...prev.prestigeUpgrades, [key]: currentLevel + 1 };
              else nextState.policies = { ...prev.policies, [key]: currentLevel + 1 };
            }
          }
          if (!canAfford && activeHoldRef.current) endHoldBuy();
          return canAfford ? nextState : prev;
        });
      }, []);

      const activeHoldRef = useRef(null);
      const holdTimerRef = useRef(null);
      
      const startHoldBuy = useCallback((type, key, e) => {
        if (e && e.cancelable) e.preventDefault(); 
        triggerBuyAction(type, key); 
        activeHoldRef.current = { type, key, delay: 350, isHolding: true }; 
        const loop = () => {
          if (!activeHoldRef.current?.isHolding) return;
          triggerBuyAction(activeHoldRef.current.type, activeHoldRef.current.key);
          activeHoldRef.current.delay = Math.max(40, activeHoldRef.current.delay * 0.75); 
          holdTimerRef.current = setTimeout(loop, activeHoldRef.current.delay);
        };
        if (holdTimerRef.current) clearTimeout(holdTimerRef.current);
        holdTimerRef.current = setTimeout(loop, activeHoldRef.current.delay);
      }, [triggerBuyAction]);

      const endHoldBuy = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault();
        if (activeHoldRef.current) activeHoldRef.current.isHolding = false;
        if (holdTimerRef.current) clearTimeout(holdTimerRef.current);
      }, []);

      const handleManualClick = useCallback((cx, cy) => {
        setGameState(prev => {
          const activeMonopolyMult = prev.monopolyBuff.active ? prev.monopolyBuff.mult : 1;
          const clickSynergy = calcEffect(prev.policyRegistry, prev.policies, 'click_synergy', true);
          const basePower = calcEffect(prev.policyRegistry, prev.policies, 'click_power', true);
          const eqBoost = applyDilation(calcEffect(prev.prestigeRegistry, prev.prestigeUpgrades, 'global_mult', false));
          const logCapMult = calcEffect(prev.policyRegistry, prev.policies, 'log_capacity', false);
          
          let grossBase = 0;
          Object.keys(prev.departmentRegistry).forEach(key => {
              if (prev.departmentRegistry[key].type === 'capital') {
                  grossBase += evaluateDepartment(prev.departmentRegistry[key], prev.departments[key] || 0, prev).gross;
              }
          });

          const localHypeBoost = 1 + (prev.hype * 0.25);
          const isBankrupt = prev.capital <= 0;
          const recoveryBoost = isBankrupt ? 50 : 1; 

          const gain = (0.5 + basePower + (grossBase * clickSynergy)) * eqBoost * activeMonopolyMult * localHypeBoost * recoveryBoost;

          // Hands on mechanics
          let nextBacklog = Math.max(0, prev.backlog - (applyDilation(50 * logCapMult) * 0.05));
          let nextHype = Math.min(5, prev.hype + 0.3);

          let newFloatingTexts = [...prev.floatingTexts];
          if (clickContainerRef.current && cx !== undefined && cy !== undefined) {
            const rect = clickContainerRef.current.getBoundingClientRect();
            newFloatingTexts.push({ id: Date.now() + Math.random(), x: cx - rect.left, y: cy - rect.top, text: `+${formatCurrency(gain, prev.settings.notation)}`, colorCode: 'emerald', expires: Date.now() + 1000 });
            if (newFloatingTexts.length > 25) newFloatingTexts.shift();
          }

          return { 
              ...prev, 
              capital: safeAdd(prev.capital, gain), 
              lifetimeCapital: safeAdd(prev.lifetimeCapital, gain), 
              runCapital: safeAdd(prev.runCapital, gain), 
              stats: { ...prev.stats, totalClicks: prev.stats.totalClicks + 1 },
              backlog: nextBacklog,
              hype: nextHype,
              floatingTexts: newFloatingTexts
          };
        });
      }, [calcEffect, evaluateDepartment]);

      const activeClickHoldRef = useRef(null);
      const clickTimerRef = useRef(null);
      
      const startHoldClick = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault(); 
        const cx = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : window.innerWidth / 2);
        const cy = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : window.innerHeight / 2);
        
        const currentRefState = stateRef.current;
        const speedReduction = calcEffect(currentRefState.policyRegistry, currentRefState.policies, 'click_speed', true);
        const minDelay = Math.max(30, 250 - speedReduction); 
        
        activeClickHoldRef.current = { delay: 400, minDelay, cx, cy, isHolding: true }; 
        const loop = () => {
            if (!activeClickHoldRef.current?.isHolding) return;
            handleManualClick(activeClickHoldRef.current.cx, activeClickHoldRef.current.cy);
            activeClickHoldRef.current.delay = Math.max(activeClickHoldRef.current.minDelay, activeClickHoldRef.current.delay * 0.85);
            clickTimerRef.current = setTimeout(loop, activeClickHoldRef.current.delay);
        };
        
        if (clickTimerRef.current) clearTimeout(clickTimerRef.current);
        handleManualClick(cx, cy); 
        clickTimerRef.current = setTimeout(loop, activeClickHoldRef.current.delay);
      }, [calcEffect, handleManualClick]);

      const endHoldClick = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault();
        if (activeClickHoldRef.current) activeClickHoldRef.current.isHolding = false;
        if (clickTimerRef.current) clearTimeout(clickTimerRef.current);
      }, []);

      useEffect(() => { 
        const handleBlur = () => { endHoldBuy(); endHoldClick(); };
        window.addEventListener('blur', handleBlur);
        document.addEventListener('visibilitychange', () => { if(document.hidden) handleBlur(); });
        return () => { 
            endHoldBuy(); endHoldClick();
            window.removeEventListener('blur', handleBlur);
            document.removeEventListener('visibilitychange', handleBlur);
        }; 
      }, [endHoldBuy, endHoldClick]);

      const handleBoomClick = () => {
        setGameState(prev => {
          if (!prev.marketBoom) return prev;
          const type = prev.marketBoom.type;
          const newState = { ...prev, marketBoom: null, stats: { ...prev.stats, marketBooms: prev.stats.marketBooms + 1 } };
          
          let newFloatingTexts = [...prev.floatingTexts];
          if (type === 'cash') {
            const reward = Math.max(50, finances.gross * 60 * 5);
            newFloatingTexts.push({ id: Date.now(), x: window.innerWidth/2, y: window.innerHeight/2, text: `+${formatCurrency(reward, prev.settings.notation)} Extraction!`, colorCode: 'emerald', expires: Date.now()+1500 });
            newState.capital = safeAdd(newState.capital, reward); 
            newState.lifetimeCapital = safeAdd(newState.lifetimeCapital, reward); 
            newState.runCapital = safeAdd(newState.runCapital, reward);
          } else if (type === 'data') {
            const reward = Math.max(5, finances.dataRate * 60 * 5);
            newFloatingTexts.push({ id: Date.now(), x: window.innerWidth/2, y: window.innerHeight/2, text: `+${formatNumber(reward, prev.settings.notation)} Data Breach!`, colorCode: 'cyan', expires: Date.now()+1500 });
            newState.data = safeAdd(newState.data, reward);
          } else if (type === 'monopoly') {
            newFloatingTexts.push({ id: Date.now(), x: window.innerWidth/2, y: window.innerHeight/2, text: `x7 SYSTEM OVERRIDE!`, colorCode: 'amber', expires: Date.now()+1500 });
            newState.monopolyBuff = { active: true, expiresAt: Date.now() + 15000, mult: 7 };
          }
          newState.floatingTexts = newFloatingTexts;
          return newState;
        });
      };

      const procStats = useMemo(() => ({
        deps: Object.keys(gameState.departmentRegistry).filter(k => k.startsWith('proc_')).length,
        pols: Object.keys(gameState.policyRegistry).filter(k => k.startsWith('proc_')).length,
        pres: Object.keys(gameState.prestigeRegistry).filter(k => k.startsWith('proc_')).length,
      }), [gameState.departmentRegistry, gameState.policyRegistry, gameState.prestigeRegistry]);

      const getResearchCost = useCallback(() => {
        const aiReducSum = calcEffect(gameState.policyRegistry, gameState.policies, 'ai_cost_reduction', true) + calcEffect(gameState.prestigeRegistry, gameState.prestigeUpgrades, 'ai_cost_reduction', true);
        const discountMult = Math.max(0.01, 1 - aiReducSum); 
        if (gameState.researchFocus === 'department') return { type: 'data', amount: 50e9 * Math.pow(1000, procStats.deps) * discountMult };
        if (gameState.researchFocus === 'policy') return { type: 'data', amount: 150e9 * Math.pow(1000, procStats.pols) * discountMult };
        return { type: 'equity', amount: Math.floor(10 * Math.pow(10, procStats.pres)) };
      }, [gameState.researchFocus, gameState.policyRegistry, gameState.prestigeRegistry, gameState.prestigeUpgrades, gameState.policies, calcEffect, procStats]);

      const executeResearch = useCallback(async () => {
        if (isResearching || !gameState.autoResearchEnabled) return;
        const cost = getResearchCost();
        if ((cost.type === 'data' && gameState.data < cost.amount) || (cost.type === 'equity' && gameState.equity < cost.amount)) return;
        
        setIsResearching(true);
        setGameState(prev => ({ ...prev, data: cost.type === 'data' ? Math.max(0, prev.data - cost.amount) : prev.data, equity: cost.type === 'equity' ? Math.max(0, prev.equity - cost.amount) : prev.equity }));
        
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        const prefixes = ["Global", "Synergistic", "Dynamic", "Apex", "Prime", "Quantum", "Vanguard", "Omni", "Hyper", "Neo", "Cosmic", "Stellar", "Astral", "Ethereal", "Hegemonic"];
        const id = `proc_${Date.now()}_${Math.floor(Math.random()*1000)}`;
        let newItem;
        
        if (gameState.researchFocus === 'department') {
          const isData = procStats.deps % 2 !== 0; 
          newItem = {
            id, name: `${prefixes[Math.floor(Math.random() * prefixes.length)]} ${isData ? 'Sub-Network' : 'Subsidiary'}`,
            desc: `Tier ${procStats.deps + 1} Artificial Construct.`, 
            baseCost: 100e24 * Math.pow(1e6, procStats.deps), 
            baseProd: 5e15 * Math.pow(1e4, procStats.deps),
            baseUpkeep: isData ? 0 : 4e15 * Math.pow(1e4, procStats.deps),
            costMult: 1.85 + (Math.random() * 0.15), type: isData ? 'data' : 'capital', icon: isData ? 'Network' : 'Building'
          };

                                {formatNumber(cost, nota)} <i className="fa-solid fa-shield-alt text-[10px]"></i>
                              </button>
                            </div>
                          </div>

                          <div className="h-px bg-slate-800/50 my-1"></div>

                      </div>
                    </div>

                    <div className="bg-[#0b1016] border border-purple-900/40 rounded-xl p-4 shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
                      <h3 className="text-[10px] lg:text-xs font-bold text-purple-400 font-mono tracking-widest mb-3 border-b border-purple-900/50 pb-2 flex items-center gap-2 uppercase">

                      </h3>
                      <div className="font-mono text-xs">
                          <div className="text-slate-400 mb-1.5">Time Dilation Level:</div>
                          <div className="text-purple-400 font-black mb-3 text-sm">{getDilationSeverity(applyDilation(1e13))}</div>
                          <div className="text-[10px] text-slate-500 leading-relaxed border-l-2 border-purple-900 pl-2">

                          </div>
                      </div>
                    </div>

                    <div className="bg-[#0b1016] border border-emerald-900/40 rounded-xl p-4 shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
                      <h3 className="text-[10px] lg:text-xs font-bold text-emerald-400 font-mono tracking-widest mb-3 border-b border-emerald-900/50 pb-2 flex items-center gap-2 uppercase">
                        <i className="fa-solid fa-chart-line"></i> Analytics
                      </h3>
                      <div className="grid grid-cols-2 gap-3">
                          <div className="bg-[#070b10] border border-slate-800/60 rounded-lg p-3 flex flex-col items-center justify-center text-center">
                            <i className="fa-solid fa-fingerprint text-emerald-500/70 mb-1.5 text-lg"></i>
                            <span className="text-[9px] text-slate-500 uppercase tracking-widest mb-0.5">Extractions</span>
                            <span className="text-sm font-black text-emerald-300 font-mono">{formatNumber(gameState.stats.totalClicks, nota)}</span>
                          </div>
                          <div className="bg-[#070b10] border border-slate-800/60 rounded-lg p-3 flex flex-col items-center justify-center text-center">
                            <i className="fa-solid fa-clock text-cyan-500/70 mb-1.5 text-lg"></i>
                            <span className="text-[9px] text-slate-500 uppercase tracking-widest mb-0.5">Time Online</span>
                            <span className="text-sm font-black text-cyan-300 font-mono">{(gameState.stats.timePlayed / 3600).toFixed(1)}h</span>
                          </div>
                      </div>
                    </div>

                  </div>
                )}

                {strategyTab === 'settings' && (
                  <div className="space-y-6 pt-2">
                    
                    <div className="bg-[#0b1016] border border-slate-800/50 rounded-xl p-4 shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
                      <h3 className="text-[10px] lg:text-xs font-bold text-emerald-500 font-mono tracking-widest mb-4 border-b border-emerald-900/50 pb-2 uppercase"><i className="fa-solid fa-desktop"></i> Display Options</h3>

                        <div className="font-bold text-xs lg:text-sm text-slate-200">Numerical Notation</div>
                        <button onClick={() => setGameState(p=>({...p, settings: {...p.settings, notation: p.settings.notation === 'standard' ? 'scientific' : 'standard'}}))} className="bg-emerald-900/30 text-emerald-300 font-mono font-bold py-1.5 px-4 rounded border border-emerald-700/50 hover:bg-emerald-800/50 transition-colors text-xs uppercase tracking-widest">
                          {nota === 'standard' ? 'Standard' : 'Scientific'}
                        </button>
                      </div>
                    </div>

                    <div className="bg-[#0b1016] border border-slate-800/50 rounded-xl p-4 shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
                      <h3 className="text-[10px] lg:text-xs font-bold text-emerald-500 font-mono tracking-widest mb-4 border-b border-emerald-900/50 pb-2 uppercase"><i className="fa-solid fa-hard-drive"></i> Data Management</h3>

                      <div className="grid grid-cols-2 gap-3 mb-3">
                        <button onClick={() => saveGame(true)} className="bg-[#070b10] hover:bg-emerald-900/20 text-emerald-400 border border-emerald-800/50 p-4 rounded-lg flex flex-col items-center gap-2 transition-colors">
                          <i className="fa-solid fa-cloud-arrow-up text-xl mb-1"></i><span className="text-[10px] font-bold uppercase tracking-widest">Force Sync</span>
                        </button>
                        <button onClick={() => setModalState({type: 'wipe'})} className="bg-[#070b10] hover:bg-red-900/20 text-red-400 border border-red-900/50 p-4 rounded-lg flex flex-col items-center gap-2 transition-colors">
                          <i className="fa-solid fa-skull text-xl mb-1"></i><span className="text-[10px] font-bold uppercase tracking-widest">Purge Save</span>
                        </button>
                      </div>
                      
                      <div className="text-[9px] text-slate-500 font-mono text-center mb-5 flex items-center justify-center gap-1 bg-black/40 py-1.5 rounded">
                        <i className="fa-solid fa-check-circle text-emerald-600"></i> Auto-syncs to local storage every 10s.
                      </div>
                      
                      <div className="space-y-3 border-t border-slate-800/50 pt-4">
                        <button onClick={() => { 
                          try {
                            const saveStr = btoa(encodeURIComponent(JSON.stringify(stateRef.current)));
                            navigator.clipboard.writeText(saveStr); 
                            showToast("Memory String Copied!"); 
                          } catch(e) { showToast("Export Error"); }
                        }} className="w-full bg-[#070b10] hover:bg-slate-800 text-slate-300 font-mono font-bold py-3 rounded-lg text-[10px] lg:text-xs transition-colors border border-slate-700 flex items-center justify-center gap-2 uppercase tracking-widest">
                          <i className="fa-solid fa-copy"></i> Copy Save String
                        </button>
                        
                        <div className="flex gap-2">
                          <input ref={importRef} type="text" placeholder="Paste string here..." className="flex-1 bg-black border border-slate-700 rounded-lg px-3 py-2 text-[10px] lg:text-xs text-emerald-400 font-mono focus:outline-none focus:border-emerald-500 shadow-inner" />
                          <button onClick={() => { 
                            try { 
                              if(importRef.current?.value) { 
                                const decodedStr = decodeURIComponent(atob(importRef.current.value));
                                JSON.parse(decodedStr); 
                                localStorage.setItem(SAVE_KEY, decodedStr); 
                                window.location.reload(); 
                              } 
                            } catch(e) { showToast("Invalid Memory String"); } 
                          }} className="bg-emerald-900/40 hover:bg-emerald-800/60 text-emerald-300 font-mono font-bold px-4 rounded-lg text-[10px] lg:text-xs transition-colors border border-emerald-600/50 uppercase tracking-widest">
                            Inject
                          </button>
                        </div>
                      </div>
                    </div>

                    <div className="space-y-6 pt-4 flex flex-col items-center text-center">
                      <div className="w-24 h-24 bg-black rounded-2xl border border-emerald-500/50 flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.3)] mb-2 relative overflow-hidden">
                         <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(16,185,129,0.2),transparent)]"></div>
                         <i className="fa-solid fa-code-branch text-4xl text-emerald-400 relative z-10"></i>
                      </div>
                      <div>
                        <h2 className="text-xl font-black text-white tracking-widest uppercase mb-1">Axiom Syndicate</h2>
                        <p className="text-xs text-emerald-500 font-mono font-bold uppercase tracking-widest">Version 0.7.1a // Unified</p>

                          <h3 className="text-emerald-500 font-bold text-[10px] lg:text-xs uppercase tracking-widest border-b border-emerald-900/50 pb-2 mb-3"><i className="fa-solid fa-history"></i> Changelog History</h3>
                          <div className="text-[10px] lg:text-xs text-slate-300 font-mono space-y-3 leading-relaxed">
                              <p><span className="text-slate-500 font-bold">v0.1.0</span> - Initial Architecture deployed.</p>
                              <p><span className="text-slate-500 font-bold">v0.5.0</span> - REALITY UPDATE. Upkeep margins, Corporate Tax Brackets, Bankruptcy limits, and Dilation Engine initiated.</p>
                              <p><span className="text-slate-500 font-bold">v0.7.0</span> - Logistics tracking, Hype networks, and Memory Backlog systems added.</p>
                              <p className="text-emerald-300 font-bold border-l-2 border-emerald-500 pl-3 py-1 bg-emerald-900/10"><span className="text-emerald-500">v0.7.1a</span> - UNIFICATION. Merged interactive systems with economics. Massive UI/UX telemetry overhaul.</p>
                          </div>
                      </div>
                    </div>

                  </div>
                )}
              </div>
            </section>
          </main>

          {/* MOBILE BOTTOM NAVIGATION */}
          <nav className="lg:hidden h-[72px] shrink-0 bg-[#070b10]/95 backdrop-blur-xl border-t border-emerald-800/40 flex z-50 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
            <button onClick={() => setMobileTab('holdings')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 transition-colors ${mobileTab === 'holdings' ? 'text-emerald-400 bg-emerald-900/20 border-t-2 border-emerald-500' : 'text-slate-500 hover:text-slate-300 border-t-2 border-transparent'}`}>
              <i className="fa-solid fa-building text-xl"></i>
              <span className="text-[9px] font-mono font-bold uppercase tracking-widest">Holdings</span>
            </button>
            <button onClick={() => setMobileTab('desk')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 transition-colors ${mobileTab === 'desk' ? 'text-white bg-white/5 border-t-2 border-white' : 'text-slate-500 hover:text-slate-300 border-t-2 border-transparent'}`}>
              <i className="fa-solid fa-fingerprint text-xl"></i>
              <span className="text-[9px] font-mono font-bold uppercase tracking-widest">Extract</span>
            </button>
            <button onClick={() => setMobileTab('strategy')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 transition-colors ${mobileTab === 'strategy' ? 'text-cyan-400 bg-cyan-900/20 border-t-2 border-cyan-500' : 'text-slate-500 hover:text-slate-300 border-t-2 border-transparent'}`}>
              <i className="fa-solid fa-network-wired text-xl"></i>
              <span className="text-[9px] font-mono font-bold uppercase tracking-widest">Strategy</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    console.clear();
    console.log("%c Axiom Syndicate: Infinite Hegemony v0.7.1a ", "background: #020202; color: #10b981; font-weight: bold; padding: 6px; border-radius: 4px; font-size: 14px;");
    console.log("%c [SYS]: Unified mechanics online. Visual telemetry enhanced. Abyssal Dilation active.", "color: #94a3b8; font-family: monospace; font-size: 12px;");
  </script>
</body>
