    const formatNumber = (num, notation = 'standard') => {
      if (num === 0 || !num || isNaN(num) || !isFinite(num)) return "0";
      const isNeg = num < 0;
      const absNum = Math.abs(num);
      let result = "";

      if (absNum < 1000) result = (absNum % 1 !== 0) ? absNum.toFixed(1) : Math.floor(absNum).toString();
      else if (notation === 'scientific' || absNum >= 1e63) {
        result = absNum.toExponential(2).replace('e+', 'e');
      } else {
        const suffixes = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td", "Qad", "Qid", "Sxd", "Spd", "Ocd", "Nod", "V"];
        const suffixNum = Math.floor(Math.log10(absNum) / 3);
        let shortValue = absNum / Math.pow(10, suffixNum * 3);
        result = shortValue.toFixed(2) + suffixes[suffixNum];
      }
      return (isNeg ? "-" : "") + result;
    };

              departmentRegistry: { ...INITIAL_DEPARTMENTS, ...(parsed.departmentRegistry || {}) },
              policyRegistry: { ...INITIAL_POLICIES, ...(parsed.policyRegistry || {}) },
              prestigeRegistry: { ...PRESTIGE_UPGRADES, ...(parsed.prestigeRegistry || {}) },
              departments: { ...Object.keys(INITIAL_DEPARTMENTS).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}), ...(parsed.departments || {}) },
              policies: { ...Object.keys(INITIAL_POLICIES).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}), ...(parsed.policies || {}) },
              prestigeUpgrades: { ...Object.keys(PRESTIGE_UPGRADES).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}), ...(parsed.prestigeUpgrades || {}) },
              stats: { ...prev.stats, ...(parsed.stats || {}) },
              settings: { ...prev.settings, ...(parsed.settings || {}) },
              monopolyBuff: parsed.monopolyBuff && parsed.monopolyBuff.expiresAt > Date.now() ? parsed.monopolyBuff : { active: false, expiresAt: 0, mult: 1 },
              runCapital: parsed.runCapital !== undefined ? parsed.runCapital : (parsed.lifetimeCapital || 0),
              lastTick: parsed.lastTick || Date.now()
            }));
          } catch (e) { console.error("Failed to load save", e); }
        } else {
            hasProcessedOffline.current = true;
        }
      }, []);

      const saveGame = useCallback((manual = false) => {
        const stateToSave = { ...stateRef.current, lastTick: Date.now() };
        localStorage.setItem(SAVE_KEY, JSON.stringify(stateToSave));
        lastSaveTime.current = Date.now();
        if (manual) showToast("System Synchronized.");
      }, []);

      const showToast = (msg) => { setSaveNotice(msg); setTimeout(() => setSaveNotice(""), 2000); };

      // --- UTILITY EFFECTS CALC ---
      const calcEffect = useCallback((registry, levels, type, isAdd = false) => {
          return Object.entries(registry).reduce((acc, [key, upg]) => {
              if (upg.effectType === type) return isAdd ? acc + ((levels[key]||0)*upg.effectBase) : acc * Math.pow(1+upg.effectBase, levels[key]||0); 
              return acc;
          }, isAdd ? 0 : 1);
      }, []);

      // Evaluates the raw financial output of a department
      const evaluateDepartment = useCallback((dep, amount, currentState) => {
          if (!amount) return { gross: 0, upkeep: 0, data: 0 };
          
          const mBoost = getMilestoneBoost(amount);
          const rBoost = getRankInfo(currentState.lifetimeCapital).current.mult;
          const eqBoost = calcEffect(currentState.prestigeRegistry, currentState.prestigeUpgrades, 'global_mult', false);
          const dBoost = applyDilation(1 + (Math.sqrt(currentState.data) * 0.01)); // Dilation applied to data buff
          const capMult = calcEffect(currentState.policyRegistry, currentState.policies, 'capital_mult', false);
          const dataPolEff = calcEffect(currentState.policyRegistry, currentState.policies, 'data_mult', false);
          
          let upkReduc = calcEffect(currentState.policyRegistry, currentState.policies, 'upkeep_reduction', true);
          const actualUpkeepRate = Math.max(0.1, 1 - upkReduc);

          let totalMult = eqBoost * rBoost * mBoost;
          totalMult = applyDilation(totalMult); // Master Dilation

          if (dep.type === 'capital') {
              return { 
                gross: amount * dep.baseProd * totalMult * dBoost * capMult, 
                upkeep: amount * (dep.baseUpkeep || 0) * actualUpkeepRate, 
                data: 0 
              };
          } else {
              return { 
                gross: 0, upkeep: 0, 
                data: amount * dep.baseProd * totalMult * dataPolEff 
              };
          }
      }, [calcEffect]);

      // --- HOLD MECHANICS ---
      const activeHoldRef = useRef(null);
      const holdTimerRef = useRef(null);

      const triggerBuyAction = useCallback((type, key) => {
        setGameState(prev => {
          let cost, canAfford = false, amountToBuy = prev.buyMultiplier;
          const drift = prev.prestigeUpgrades.bailouts || 0;
          let nextState = { ...prev };

          if (type === 'department') {
            const dep = prev.departmentRegistry[key];
            const currentLevel = prev.departments[key] || 0;
            const currency = prev.capital; 
            
            if (amountToBuy === -1) amountToBuy = calculateMaxAffordable(dep.baseCost, dep.costMult, currentLevel, currency, drift);
            if (amountToBuy <= 0) return prev;
            
            cost = calculateCost(dep.baseCost, dep.costMult, currentLevel, amountToBuy, drift);
            canAfford = currency >= cost;
            
            // BANKRUPTCY SAFETY: Don't allow max buy to drop capital to 0 if net is negative (handled mostly by player awareness, but let's let them fail if they want to)
            if (canAfford) {
              nextState.capital = prev.capital - cost;
              nextState.departments = { ...prev.departments, [key]: currentLevel + amountToBuy };
            }
          } else {
            const isPrestige = type === 'prestige';
            const upgDef = isPrestige ? prev.prestigeRegistry[key] : prev.policyRegistry[key];
            const currentLevel = isPrestige ? (prev.prestigeUpgrades[key] || 0) : (prev.policies[key] || 0);
            cost = calculateCost(isPrestige ? upgDef.cost : upgDef.baseCost, upgDef.costMult, currentLevel, 1, isPrestige ? 0 : drift);
            canAfford = (isPrestige ? prev.equity : prev.capital) >= cost;
            if (canAfford) {
              nextState.capital = isPrestige ? prev.capital : prev.capital - cost;
              nextState.equity = isPrestige ? prev.equity - cost : prev.equity;
              if (isPrestige) nextState.prestigeUpgrades = { ...prev.prestigeUpgrades, [key]: currentLevel + 1 };
              else nextState.policies = { ...prev.policies, [key]: currentLevel + 1 };
            }
          }
          if (!canAfford && activeHoldRef.current) endHoldBuy();
          return canAfford ? nextState : prev;
        });
      }, []);

      const startHoldBuy = useCallback((type, key, e) => {
        if (e && e.cancelable) e.preventDefault(); 
        triggerBuyAction(type, key); 
        activeHoldRef.current = { type, key, delay: 350, isHolding: true }; 
        const loop = () => {
          if (!activeHoldRef.current?.isHolding) return;
          triggerBuyAction(activeHoldRef.current.type, activeHoldRef.current.key);
          activeHoldRef.current.delay = Math.max(40, activeHoldRef.current.delay * 0.75); 
          holdTimerRef.current = setTimeout(loop, activeHoldRef.current.delay);
        };
        if (holdTimerRef.current) clearTimeout(holdTimerRef.current);
        holdTimerRef.current = setTimeout(loop, activeHoldRef.current.delay);
      }, [triggerBuyAction]);

      const endHoldBuy = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault();
        if (activeHoldRef.current) activeHoldRef.current.isHolding = false;
        if (holdTimerRef.current) clearTimeout(holdTimerRef.current);
      }, []);

      const activeClickHoldRef = useRef(null);
      const clickTimerRef = useRef(null);

      const startHoldClick = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault(); 
        const cx = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : window.innerWidth / 2);
        const cy = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : window.innerHeight / 2);
        
        const currentRefState = stateRef.current;
        const speedReduction = calcEffect(currentRefState.policyRegistry, currentRefState.policies, 'click_speed', true);
        const minDelay = Math.max(30, 250 - speedReduction); 

        activeClickHoldRef.current = { delay: 400, minDelay, cx, cy, isHolding: true }; 
        
        const loop = () => {
            if (!activeClickHoldRef.current?.isHolding) return;
            handleManualClick(activeClickHoldRef.current.cx, activeClickHoldRef.current.cy);
            activeClickHoldRef.current.delay = Math.max(activeClickHoldRef.current.minDelay, activeClickHoldRef.current.delay * 0.85);
            clickTimerRef.current = setTimeout(loop, activeClickHoldRef.current.delay);
        };
        
        if (clickTimerRef.current) clearTimeout(clickTimerRef.current);
        handleManualClick(cx, cy); 
        clickTimerRef.current = setTimeout(loop, activeClickHoldRef.current.delay);
      }, [calcEffect]);

      const endHoldClick = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault();
        if (activeClickHoldRef.current) activeClickHoldRef.current.isHolding = false;
        if (clickTimerRef.current) clearTimeout(clickTimerRef.current);
      }, []);

      useEffect(() => { 
        const handleBlur = () => { endHoldBuy(); endHoldClick(); };
        window.addEventListener('blur', handleBlur);
        document.addEventListener('visibilitychange', () => { if(document.hidden) handleBlur(); });
        return () => { 
            endHoldBuy(); endHoldClick();
            window.removeEventListener('blur', handleBlur);
            document.removeEventListener('visibilitychange', handleBlur);
        }; 
      }, [endHoldBuy, endHoldClick]);

      // --- CORE GAME LOOP ---
      useEffect(() => {
        let animationFrameId;
        const gameLoop = () => {
          const now = Date.now();
          if (preBoot || scolding) {
              animationFrameId = requestAnimationFrame(gameLoop);
              return;
          }

          setGameState(prev => {
            const deltaMs = now - prev.lastTick;
            if (deltaMs < 50) return prev; 

            // Time Warp Dilation
            let rawTimeBoost = calcEffect(prev.prestigeRegistry, prev.prestigeUpgrades, 'time_warp', false);
            const timeBoost = applyDilation(rawTimeBoost);

            let deltaSec = Math.min(deltaMs, 2592000000) / 1000 * timeBoost; // Cap at 1 month of offline time
            const newState = { ...prev, lastTick: now };
            newState.stats.timePlayed += deltaSec;

            // Finance Calcs
            let totalGross = 0, totalUpkeep = 0, totalData = calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'base_data', true);
            
            Object.keys(newState.departmentRegistry).forEach(key => {
                const dep = newState.departmentRegistry[key];
                const amount = newState.departments[key] || 0;
                if (amount > 0) {
                    const evalRes = evaluateDepartment(dep, amount, newState);
                    totalGross += evalRes.gross;
                    totalUpkeep += evalRes.upkeep;
                    totalData += evalRes.data;
                }
            });

            // Active Monopoly Buff
            if (newState.monopolyBuff.active && now > newState.monopolyBuff.expiresAt) newState.monopolyBuff = { active: false, expiresAt: 0, mult: 1 };
            const activeMonopolyMult = newState.monopolyBuff.active ? newState.monopolyBuff.mult : 1;
            totalGross *= activeMonopolyMult;
            totalData *= activeMonopolyMult;

            // Calculate Taxes
            const profitBeforeTax = totalGross - totalUpkeep;
            let effectiveTaxRate = 0;
            
            if (profitBeforeTax > 0) {
                // Find highest applicable bracket
                for (let i = TAX_BRACKETS.length - 1; i >= 0; i--) {
                    if (profitBeforeTax >= TAX_BRACKETS[i].threshold) {
                        effectiveTaxRate = TAX_BRACKETS[i].rate;
                        break;
                    }
                }
            }
            
            // Apply Evasion & Loopholes
            const evasionDrop = calcEffect(newState.policyRegistry, newState.policies, 'tax_reduction', true) + calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'tax_reduction', true);
            effectiveTaxRate = Math.max(0, effectiveTaxRate - evasionDrop);

            const taxAmount = profitBeforeTax > 0 ? profitBeforeTax * effectiveTaxRate : 0;
            const netCapitalRate = totalGross - totalUpkeep - taxAmount;

            // BANKRUPTCY CHECK
            const isBankrupt = newState.capital <= 0 && netCapitalRate < 0;
            
            if (isBankrupt) {
                newState.capital = 0;
                totalData = 0; // Servers shut off
            }

            // Apply Auto Clicks (Gross Generation, bypasses upkeep but hits taxes?) 
            // For balance, auto clicks add to gross.
            const autoClicks = calcEffect(newState.policyRegistry, newState.policies, 'auto_click', true);
            let autoGain = 0;
            if (autoClicks > 0 && !isBankrupt) {
                const basePower = calcEffect(newState.policyRegistry, newState.policies, 'click_power', true);
                const clickSynergy = calcEffect(newState.policyRegistry, newState.policies, 'click_synergy', true);
                const eqBoost = applyDilation(calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'global_mult', false));
                
                autoGain = ((0.5 + basePower + (totalGross * clickSynergy)) * eqBoost * activeMonopolyMult) * autoClicks;
                // Treat autogain as pure net for simplicity to help them out of holes
            }

            setFinances({
                gross: totalGross, upkeep: totalUpkeep, profit: profitBeforeTax, 
                taxRate: effectiveTaxRate, taxAmount, net: netCapitalRate, 
                dataRate: totalData, isBankrupt, dilation: applyDilation(1e25) / 1e25 // Tracking sample dilation
            });

            const tickNet = netCapitalRate * deltaSec;
            const tickAuto = autoGain * deltaSec;
            const totalCapChange = tickNet + tickAuto;

            if (!hasProcessedOffline.current) {
                hasProcessedOffline.current = true;
                if (deltaSec > 60 && (totalCapChange !== 0 || totalData > 0)) setOfflineReport({ time: deltaSec, capital: totalCapChange, data: totalData * deltaSec });
            }

            if (totalCapChange !== 0) { 
                newState.capital = safeAdd(newState.capital, totalCapChange); 
                if (newState.capital < 0) newState.capital = 0; // Hard floor
                if (totalCapChange > 0) {
                    newState.lifetimeCapital = safeAdd(newState.lifetimeCapital, totalCapChange); 
                    newState.runCapital = safeAdd(newState.runCapital, totalCapChange); 
                }
            }
            if (totalData > 0 && !isBankrupt) newState.data = safeAdd(newState.data, totalData * deltaSec);

            // Market Booms
            if (!newState.marketBoom && Math.random() < (0.005 * deltaSec) && !isBankrupt) { 
              const r = Math.random();
              newState.marketBoom = { 
                x: Math.floor(Math.random() * 80) + 10, y: Math.floor(Math.random() * 80) + 10, 
                expiresAt: now + 15000, type: r > 0.90 && newState.data > 0 ? 'monopoly' : r > 0.65 && newState.data > 0 ? 'data' : 'cash' 
              };
            }
            if (newState.marketBoom && now > newState.marketBoom.expiresAt) newState.marketBoom = null;

            // AI Manager Auto-Buy (Only safe buys if not bankrupt)
            if (newState.policies.aiManager > 0 && newState.settings.aiManagerOn && !isBankrupt && Math.random() < (0.5 * deltaSec)) {
               const drift = newState.prestigeUpgrades.bailouts || 0;
               let bestBuy = null;
               Object.keys(newState.departmentRegistry).forEach(key => {
                   const dep = newState.departmentRegistry[key];
                   const count = newState.departments[key] || 0;
                   const cost = calculateCost(dep.baseCost, dep.costMult, count, 1, drift);
                   
                   // Safety check: Don't let AI push upkeep above 80% of gross
                   const testEval = evaluateDepartment(dep, count + 1, newState);
                   const isSafe = (totalUpkeep + testEval.upkeep) < (totalGross * 0.8) || dep.type === 'data';

                   if (newState.capital >= cost && isSafe) { 
                       if (!bestBuy || cost > bestBuy.cost) bestBuy = { key, cost }; 
                   }
               });
               if (bestBuy) {
                   newState.capital -= bestBuy.cost;
                   newState.departments[bestBuy.key] = (newState.departments[bestBuy.key] || 0) + 1;
               }
            }

            if (now - lastSaveTime.current > 10000) {
               localStorage.setItem(SAVE_KEY, JSON.stringify(newState));
               lastSaveTime.current = now;
            }

            return newState;
          });
          animationFrameId = requestAnimationFrame(gameLoop);
        };
        animationFrameId = requestAnimationFrame(gameLoop);
        return () => cancelAnimationFrame(animationFrameId);
      }, [calcEffect, evaluateDepartment, preBoot, scolding]);

      // --- ACTIONS ---
      const handleManualClick = useCallback((cx, cy) => {
        setGameState(prev => {
          const activeMonopolyMult = prev.monopolyBuff.active ? prev.monopolyBuff.mult : 1;
          const clickSynergy = calcEffect(prev.policyRegistry, prev.policies, 'click_synergy', true);
          const basePower = calcEffect(prev.policyRegistry, prev.policies, 'click_power', true);
          const eqBoost = applyDilation(calcEffect(prev.prestigeRegistry, prev.prestigeUpgrades, 'global_mult', false));
          
          let grossBase = 0;
          Object.keys(prev.departmentRegistry).forEach(key => {
              if (prev.departmentRegistry[key].type === 'capital') {
                  grossBase += evaluateDepartment(prev.departmentRegistry[key], prev.departments[key] || 0, prev).gross;
              }
          });

          // Clicks are raw un-taxed income bursts to help escape bankruptcy
          const gain = (0.5 + basePower + (grossBase * clickSynergy)) * eqBoost * activeMonopolyMult;
          
          if (clickContainerRef.current && cx !== undefined && cy !== undefined) {
            const rect = clickContainerRef.current.getBoundingClientRect();
            addFloatingText(cx - rect.left, cy - rect.top, `+${formatCurrency(gain, prev.settings.notation)}`, 'emerald');
          }
          return { 
              ...prev, 
              capital: safeAdd(prev.capital, gain), 
              lifetimeCapital: safeAdd(prev.lifetimeCapital, gain), 
              runCapital: safeAdd(prev.runCapital, gain), 
              stats: { ...prev.stats, totalClicks: prev.stats.totalClicks + 1 } 
          };
        });
      }, [calcEffect, evaluateDepartment]);

      const addFloatingText = (x, y, text, colorCode = 'emerald') => {
        const id = Date.now() + Math.random();
        setFloatingTexts(prev => [...prev, { id, x, y, text, colorCode }]);
        setTimeout(() => setFloatingTexts(prev => prev.filter(ft => ft.id !== id)), 1000);
      };

      const handleBoomClick = () => {
        setGameState(prev => {
          if (!prev.marketBoom) return prev;
          const type = prev.marketBoom.type;
          const newState = { ...prev, marketBoom: null, stats: { ...prev.stats, marketBooms: prev.stats.marketBooms + 1 } };
          if (type === 'cash') {
            const reward = Math.max(50, finances.gross * 60 * 5); // 5 minutes of gross
            addFloatingText(window.innerWidth/2, window.innerHeight/2, `+${formatCurrency(reward, prev.settings.notation)} Extraction!`, 'emerald');
            newState.capital = safeAdd(newState.capital, reward); 
            newState.lifetimeCapital = safeAdd(newState.lifetimeCapital, reward); 
            newState.runCapital = safeAdd(newState.runCapital, reward);
          } else if (type === 'data') {
            const reward = Math.max(5, finances.dataRate * 60 * 5);
            addFloatingText(window.innerWidth/2, window.innerHeight/2, `+${formatNumber(reward, prev.settings.notation)} Data Breach!`, 'cyan');
            newState.data = safeAdd(newState.data, reward);
          } else if (type === 'monopoly') {
            addFloatingText(window.innerWidth/2, window.innerHeight/2, `x7 SYSTEM OVERRIDE!`, 'amber');
            newState.monopolyBuff = { active: true, expiresAt: Date.now() + 15000, mult: 7 };
          }
          return newState;
        });
      };

      // --- PROCEDURAL INFINITE R&D ---
      const procStats = useMemo(() => ({
        deps: Object.keys(gameState.departmentRegistry).filter(k => k.startsWith('proc_')).length,
        pols: Object.keys(gameState.policyRegistry).filter(k => k.startsWith('proc_')).length,
        pres: Object.keys(gameState.prestigeRegistry).filter(k => k.startsWith('proc_')).length,
      }), [gameState.departmentRegistry, gameState.policyRegistry, gameState.prestigeRegistry]);

      const getResearchCost = useCallback(() => {
        const aiReducSum = calcEffect(gameState.policyRegistry, gameState.policies, 'ai_cost_reduction', true) + calcEffect(gameState.prestigeRegistry, gameState.prestigeUpgrades, 'ai_cost_reduction', true);
        const discountMult = Math.max(0.01, 1 - aiReducSum); 
        
        // Procedural costs scale absurdly to enforce the 10-year wall
        if (gameState.researchFocus === 'department') return { type: 'data', amount: 50e9 * Math.pow(1000, procStats.deps) * discountMult };
        if (gameState.researchFocus === 'policy') return { type: 'data', amount: 150e9 * Math.pow(1000, procStats.pols) * discountMult };
        return { type: 'equity', amount: Math.floor(10 * Math.pow(10, procStats.pres)) };
      }, [gameState.researchFocus, gameState.policyRegistry, gameState.prestigeRegistry, gameState.prestigeUpgrades, gameState.policies, calcEffect, procStats]);

      const executeResearch = useCallback(async () => {
        if (isResearching || !gameState.autoResearchEnabled) return;
        const cost = getResearchCost();
        if ((cost.type === 'data' && gameState.data < cost.amount) || (cost.type === 'equity' && gameState.equity < cost.amount)) return;

        setIsResearching(true);
        setGameState(prev => ({ ...prev, data: cost.type === 'data' ? Math.max(0, prev.data - cost.amount) : prev.data, equity: cost.type === 'equity' ? Math.max(0, prev.equity - cost.amount) : prev.equity }));

        await new Promise(resolve => setTimeout(resolve, 1500));

        const prefixes = ["Global", "Synergistic", "Dynamic", "Apex", "Prime", "Quantum", "Vanguard", "Omni", "Hyper", "Neo", "Cosmic", "Stellar", "Astral", "Ethereal", "Hegemonic"];
        const id = `proc_${Date.now()}_${Math.floor(Math.random()*1000)}`;
        let newItem;
        
        if (gameState.researchFocus === 'department') {
          const isData = procStats.deps % 2 !== 0; 
          newItem = {
            id, name: `${prefixes[Math.floor(Math.random() * prefixes.length)]} ${isData ? 'Sub-Network' : 'Subsidiary'}`,
            desc: `Tier ${procStats.deps + 1} Artificial Construct.`, 
            baseCost: 100e24 * Math.pow(1e6, procStats.deps), 
            baseProd: 5e15 * Math.pow(1e4, procStats.deps),
            baseUpkeep: isData ? 0 : 4e15 * Math.pow(1e4, procStats.deps), // 80% upkeep margin
            costMult: 1.85 + (Math.random() * 0.15), type: isData ? 'data' : 'capital', icon: isData ? 'Network' : 'Building'
          };
        } else if (gameState.researchFocus === 'policy') {
          const r = Math.random();
          const eType = r > 0.6 ? 'tax_reduction' : r > 0.3 ? 'upkeep_reduction' : 'capital_mult';
          newItem = {
            id, name: `${prefixes[Math.floor(Math.random() * prefixes.length)]} Protocol`, desc: `Tier ${procStats.pols + 1} System Override.`, 
            baseCost: 500e24 * Math.pow(1e6, procStats.pols), costMult: 15 + Math.random() * 5,
            effectType: eType, effectBase: eType === 'capital_mult' ? 1.0 * (procStats.pols + 1) : 0.01 // Soft 1% for reduction stats
          };
        } else {
          newItem = {
            id, name: `${prefixes[Math.floor(Math.random() * prefixes.length)]} Reality Shift`, desc: `Tier ${procStats.pres + 1} Dimensional Hegemony.`, 
            cost: 50 * Math.pow(10, procStats.pres), costMult: 8 + Math.random() * 4,
            effectType: 'global_mult', effectBase: 2.0 * (procStats.pres + 1)
          };
        }
        
        setGameState(prev => {
          if (prev.researchFocus === 'department') return { ...prev, departmentRegistry: { ...prev.departmentRegistry, [newItem.id]: newItem }, departments: { ...prev.departments, [newItem.id]: 0 } };
          if (prev.researchFocus === 'policy') return { ...prev, policyRegistry: { ...prev.policyRegistry, [newItem.id]: newItem }, policies: { ...prev.policies, [newItem.id]: 0 } };
          if (prev.researchFocus === 'prestige') return { ...prev, prestigeRegistry: { ...prev.prestigeRegistry, [newItem.id]: newItem }, prestigeUpgrades: { ...prev.prestigeUpgrades, [newItem.id]: 0 } }; 
          return prev;
        });
        setIsResearching(false);
      }, [gameState.autoResearchEnabled, gameState.data, gameState.equity, gameState.researchFocus, getResearchCost, isResearching, procStats]);

      useEffect(() => {
        let interval;
        if (gameState.autoResearchEnabled && !isResearching) {
          interval = setInterval(() => {
            const cost = getResearchCost();
            if ((cost.type === 'data' && gameState.data >= cost.amount) || (cost.type === 'equity' && gameState.equity >= cost.amount)) executeResearch();
          }, 5000);
        }
        return () => clearInterval(interval);
      }, [gameState.autoResearchEnabled, gameState.data, gameState.equity, getResearchCost, executeResearch, isResearching]);

      // --- MODALS & HELPERS ---
      
      const calculateBuyoutRewards = () => {
        const baseReq = 1000000000 * Math.pow(10000, gameState.buyouts); // Massively harder scaling
        if (gameState.runCapital < baseReq) return 0;
        return Math.floor(Math.pow(gameState.runCapital / baseReq, 0.15)); 
      };

      const getNextBuyoutReq = () => {
        const baseReq = 1000000000 * Math.pow(10000, gameState.buyouts);
        const currentRewards = calculateBuyoutRewards();
        return baseReq * Math.pow(currentRewards + 1, 1 / 0.15); 
      };
      
      const confirmBuyout = () => {
        const rewards = calculateBuyoutRewards();
        setGameState(prev => ({
          ...prev, capital: 0, data: 0, runCapital: 0, buyouts: prev.buyouts + 1, equity: safeAdd(prev.equity, rewards), monopolyBuff: { active: false, expiresAt: 0, mult: 1 },
          departments: Object.keys(prev.departmentRegistry).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}),
          policies: Object.keys(prev.policyRegistry).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}), lastTick: Date.now()
        }));
        setModalState(null);
        showToast("Hostile Takeover Complete.");
      };

      const confirmWipe = () => {
        localStorage.removeItem(SAVE_KEY);
        window.location.reload();
      };
