<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Nug_Hub | Centralized Terminal</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700;800&display=swap');

    :root {
      --bg-dark: #020202;
      --term-green: #10b981;
      --term-dark-green: #064e3b;
      --panel-bg: rgba(10, 12, 16, 0.85);
      --panel-border: rgba(16, 185, 129, 0.2);
    }

    body {
      margin: 0;
      background-color: var(--bg-dark);
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden; 
      user-select: none;
    }

    /* Immersive Visual Layers */
    .scanlines {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 3px 100%;
      z-index: 50; pointer-events: none; opacity: 0.6;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(to right, rgba(16, 185, 129, 0.03) 1px, transparent 1px), 
                        linear-gradient(to bottom, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -2;
    }

    .vignette {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(2,2,2,0.95) 100%);
      z-index: 40; pointer-events: none;
    }

    .hub-panel { 
      background: var(--panel-bg); 
      border: 1px solid var(--panel-border); 
      box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(16, 185, 129, 0.03);
      backdrop-filter: blur(12px);
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Navigation Active Styles */
    .active-tab {
      background: rgba(16, 185, 129, 0.1);
      border-left: 4px solid var(--term-green);
      color: var(--term-green);
      text-shadow: 0 0 10px rgba(16,185,129,0.5);
    }

    .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .text-glow { text-shadow: 0 0 12px rgba(16,185,129,0.6); }

    /* CRT Flicker for Boot Screen */
    .animate-flicker { animation: flicker 0.15s infinite; }
    @keyframes flicker {
      0% { opacity: 0.95; }
      50% { opacity: 0.85; }
      100% { opacity: 0.95; }
    }
  </style>
</head>
<body>

  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bg-grid"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- IMMERSION LOCK COMPONENT ---
    const ImmersionLock = ({ onUnlock }) => {
      return (
        <div 
          className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black cursor-pointer group"
          onClick={onUnlock}
        >
          <div className="text-center animate-flicker">
            <i className="fa-solid fa-terminal text-6xl text-emerald-500 mb-6 drop-shadow-[0_0_15px_rgba(16,185,129,0.8)] group-hover:scale-110 transition-transform duration-300"></i>
            <h1 className="text-2xl md:text-4xl font-black text-emerald-500 uppercase tracking-[0.3em] text-glow">
              Initialize Nug_Hub
            </h1>
            <p className="mt-4 text-emerald-500/70 font-mono text-sm tracking-widest animate-pulse">
              [ CLICK ANYWHERE TO ESTABLISH UPLINK ]
            </p>
          </div>
        </div>
      );
    };

    // --- LIVE CLOCK COMPONENT ---
    const SystemClock = () => {
      const [time, setTime] = useState(new Date());
      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);
      
      return (
        <div className="flex items-center gap-3 text-xs text-emerald-500/80 font-mono bg-black/50 px-4 py-2 rounded border border-emerald-500/20">
          <i className="fa-regular fa-clock"></i>
          <span>{time.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
          <span className="font-bold text-emerald-400">{time.toLocaleTimeString('en-US', { hour12: false })}</span>
        </div>
      );
    };

    // --- MAIN APP COMPONENT ---
    function App() {
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');

      const tabs = [
        { id: 'dashboard', icon: 'fa-server', label: 'Dashboard' },
        { id: 'axiom', icon: 'fa-network-wired', label: 'Axiom Syndicate' },
        { id: 'about', icon: 'fa-user-astronaut', label: 'About Me' },
        { id: 'archive', icon: 'fa-folder-open', label: 'Project Archive' }
      ];

      // Fullscreen Logic
      useEffect(() => {
        const handleFullscreenChange = () => {
          setIsFullscreen(!!document.fullscreenElement);
        };
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }, []);

      const toggleFullscreen = async () => {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen().catch(err => console.warn(err));
        } else {
          await document.exitFullscreen().catch(err => console.warn(err));
        }
      };

      const handleUnlock = async () => {
        setIsUnlocked(true);
        if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen().catch(err => console.warn(err));
        }
      };

      // Tab Content Render
      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard': 
            return (
              <div className="animate-fade flex flex-col justify-center h-full max-w-4xl">
                <div className="mb-6 inline-flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/30 rounded text-[10px] text-emerald-500 uppercase tracking-widest">
                  <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                  Connection Secure
                </div>
                
                <h1 className="text-5xl lg:text-7xl font-black uppercase tracking-tight text-white mb-6 leading-none text-glow">
                  Welcome to <br/><span className="text-emerald-500">Nug_Hub</span>
                </h1>
                
                <div className="space-y-6 text-sm md:text-base text-slate-400 font-mono leading-relaxed max-w-2xl">
                  <p>
                    This centralized terminal serves as the core repository for ongoing interactive developments, continuous simulations, multimedia broadcasting, and long-term codebase archiving.
                  </p>
                  <p>
                    The current primary focus is the scaling and infrastructure development of the <strong>Axiom Syndicate</strong> engine. Navigate to the dedicated sector to review objective parameters and establish a direct simulation uplink.
                  </p>
                </div>

                <div className="mt-10 grid grid-cols-2 md:grid-cols-4 gap-4">
                  <div className="bg-black/50 border border-white/5 p-4 rounded-lg text-center shadow-[inset_0_0_15px_rgba(0,0,0,0.5)]">
                    <i className="fa-solid fa-code-commit text-emerald-500 mb-2 text-xl"></i>
                    <div className="text-[10px] text-slate-500 uppercase tracking-widest">Status</div>
                    <div className="text-white font-bold text-xs uppercase">Active Dev</div>
                  </div>
                  <div className="bg-black/50 border border-white/5 p-4 rounded-lg text-center shadow-[inset_0_0_15px_rgba(0,0,0,0.5)]">
                    <i className="fa-solid fa-microchip text-emerald-500 mb-2 text-xl"></i>
                    <div className="text-[10px] text-slate-500 uppercase tracking-widest">Framework</div>
                    <div className="text-white font-bold text-xs uppercase">React 18 + TW</div>
                  </div>
                  <div className="bg-black/50 border border-white/5 p-4 rounded-lg text-center shadow-[inset_0_0_15px_rgba(0,0,0,0.5)]">
                    <i className="fa-solid fa-headphones text-emerald-500 mb-2 text-xl"></i>
                    <div className="text-[10px] text-slate-500 uppercase tracking-widest">Audio</div>
                    <div className="text-white font-bold text-xs uppercase">Pipeline</div>
                  </div>
                </div>
              </div>
            );

          case 'axiom': 
            return (
              <div className="animate-fade h-full flex flex-col max-w-5xl mx-auto w-full pt-4 md:pt-10 overflow-y-auto no-scrollbar">
                <div className="flex items-center gap-6 mb-8 border-b border-emerald-500/20 pb-6 shrink-0">
                    <i className="fa-solid fa-fingerprint text-6xl md:text-8xl text-emerald-500 drop-shadow-[0_0_20px_rgba(16,185,129,0.4)]"></i>
                    <div>
                        <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-widest text-glow mb-2">Axiom Syndicate</h2>
                        <p className="text-emerald-500 font-mono text-sm tracking-widest uppercase">Infinite Hegemony :: v0.7.0 BETA</p>
                    </div>
                </div>
                
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 pb-10">
                    {/* Lore & Objective */}
                    <div className="lg:col-span-2 space-y-6">
                        <div className="bg-black/60 border border-emerald-500/20 p-6 rounded-xl">
                            <h3 className="text-emerald-400 font-bold uppercase tracking-widest mb-3 text-sm flex items-center gap-2">
                                <i className="fa-solid fa-book-journal-whills"></i> Operation Briefing
                            </h3>
                            <p className="text-slate-300 font-mono text-sm leading-relaxed mb-4">
                                You are a low-level operative thrust into a dystopian corporate ladder. Your objective is absolute market domination. Start from a humble street-side operation and relentlessly expand your influence, harvest user data, and manipulate global markets to build a Multiversal Monopoly.
                            </p>
                            <p className="text-slate-300 font-mono text-sm leading-relaxed">
                                <strong>Warning:</strong> This simulation represents a massive scale incremental system. It is designed to be a marathon, not a sprint. Reaching the highest corporate echelons will require significant time, strategy, and strategic prestige buyouts.
                            </p>
                        </div>

                        <div className="bg-emerald-900/10 border border-emerald-500/30 p-6 rounded-xl flex items-center justify-between shadow-[inset_0_0_30px_rgba(16,185,129,0.05)]">
                            <div>
                                <h3 className="text-white font-bold uppercase tracking-widest mb-1 text-sm">Local Progress Archiving</h3>
                                <p className="text-slate-400 font-mono text-xs max-w-sm">All capital and corporate holdings are saved locally to your device. You may disconnect and return without loss of systemic dominance.</p>
                            </div>
                            <i className="fa-solid fa-hard-drive text-3xl text-emerald-500 opacity-50 ml-4 hidden sm:block"></i>
                        </div>
                    </div>

                    {/* Launch Panel */}
                    <div className="flex flex-col gap-4">
                        <div className="bg-black/80 border border-white/10 p-6 rounded-xl flex-1 flex flex-col justify-center items-center text-center">
                            <i className="fa-solid fa-satellite-dish text-4xl text-slate-500 mb-4"></i>
                            <h4 className="text-white font-bold uppercase tracking-widest mb-2">Uplink Ready</h4>
                            <p className="text-xs text-slate-500 font-mono mb-8">Simulation payload compiled and awaiting execution.</p>
                            
                            {/* THE LINK TO YOUR GAME */}
                            <a href="game.html" className="w-full py-4 bg-emerald-600/20 border border-emerald-500 rounded text-emerald-400 font-bold hover:bg-emerald-500 hover:text-black transition-all uppercase tracking-widest text-sm shadow-[0_0_15px_rgba(16,185,129,0.2)] hover:shadow-[0_0_30px_rgba(16,185,129,0.6)] flex items-center justify-center gap-3">
                                <i className="fa-solid fa-play"></i> Initialize Uplink
                            </a>
                        </div>
                    </div>
                </div>
              </div>
            );

          case 'about':
            return (
              <div className="animate-fade h-full flex flex-col max-w-5xl mx-auto w-full pt-4 md:pt-10 overflow-y-auto no-scrollbar">
                <div className="flex flex-col md:flex-row md:items-center gap-6 mb-8 border-b border-emerald-500/20 pb-6 shrink-0">
                    <i className="fa-brands fa-youtube text-6xl md:text-8xl text-red-600 drop-shadow-[0_0_20px_rgba(220,38,38,0.4)]"></i>
                    <div>
                        <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-widest text-glow mb-2">Developer Profile</h2>
                        <a href="https://www.youtube.com/@King_Nugget_AU" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 text-emerald-500 hover:text-emerald-400 font-mono text-sm tracking-widest uppercase transition-colors bg-emerald-500/10 px-3 py-1 rounded border border-emerald-500/30">
                          @King_Nugget_AU <i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                        </a>
                    </div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-10">
                    {/* Game Philosophy */}
                    <div className="bg-black/60 border border-emerald-500/20 p-6 rounded-xl flex flex-col gap-4">
                        <h3 className="text-emerald-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                            <i className="fa-solid fa-gamepad"></i> Game Design Philosophy
                        </h3>
                        <p className="text-slate-300 font-mono text-sm leading-relaxed">
                            Axiom Syndicate represents my journey into learning basic game development. It was born out of a profound frustration with the modern idle and mobile gaming market.
                        </p>
                        <p className="text-slate-300 font-mono text-sm leading-relaxed">
                            My goal is to set a new standard for pacing. Idle games should be slower and significantly more involved. I am building a true marathon—a systemic progression meant to be played over months, completely discarding the shallow loop that lasts a week tops just to milk the user for ad views and microtransactions.
                        </p>
                    </div>

                    {/* Audio & Foley */}
                    <div className="bg-black/60 border border-emerald-500/20 p-6 rounded-xl flex flex-col gap-4">
                        <h3 className="text-emerald-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                            <i className="fa-solid fa-microphone-lines"></i> Audio & Foley Production
                        </h3>
                        <p className="text-slate-300 font-mono text-sm leading-relaxed">
                            Beyond standard web development and coding, I am deeply invested in exploring immersive audio landscapes. 
                        </p>
                        <p className="text-slate-300 font-mono text-sm leading-relaxed">
                            I currently have several unreleased projects centered around custom foley recording. These projects are partially recorded and remain in the pipeline, with the ultimate aim of bringing high-fidelity, handcrafted auditory experiences to my interactive media.
                        </p>
                    </div>
                    
                    {/* Channel Broadcaster */}
                    <div className="md:col-span-2 bg-emerald-900/10 border border-emerald-500/30 p-6 md:p-8 rounded-xl flex flex-col md:flex-row items-center gap-6 shadow-[inset_0_0_30px_rgba(16,185,129,0.05)]">
                        <i className="fa-solid fa-video text-5xl text-emerald-500/50"></i>
                        <div className="text-center md:text-left">
                            <h3 className="text-white font-bold uppercase tracking-widest mb-2 text-base">Content Broadcasting Network</h3>
                            <p className="text-slate-400 font-mono text-sm leading-relaxed max-w-3xl">
                                Progress on the idle engine, technical devlogs, and future audio/foley experiments will be documented and broadcasted. Navigate to the primary YouTube channel link above to monitor network updates and follow the independent development journey.
                            </p>
                        </div>
                    </div>
                </div>
              </div>
            );

          case 'archive':
            return (
              <div className="animate-fade h-full flex flex-col justify-center items-center text-center max-w-2xl mx-auto">
                <i className="fa-solid fa-folder-tree text-6xl text-slate-700 mb-6 drop-shadow-[0_0_15px_rgba(0,0,0,0.8)]"></i>
                <h2 className="text-2xl font-bold text-slate-500 uppercase tracking-widest">Project Archive</h2>
                <div className="mt-4 p-4 border border-white/5 bg-black/50 rounded-lg">
                    <p className="text-slate-500 text-xs font-mono leading-relaxed">
                      // DIRECTORY EMPTY <br/><br/>
                      No legacy projects available for review at this time. Future retired simulations, deprecated mechanics, and archived foley files will be securely stored here.
                    </p>
                </div>
              </div>
            );

          default: 
            return null;
        }
      };

      if (!isUnlocked) {
        return <ImmersionLock onUnlock={handleUnlock} />;
      }

      return (
        <div className="flex flex-col h-screen p-4 lg:p-6 max-w-[1600px] mx-auto relative z-10 animate-fade">
          
          {/* HEADER LAYER */}
          <header className="mb-6 px-2 flex justify-between items-center shrink-0">
             <div className="flex items-center gap-4">
               <div className="font-black tracking-[0.4em] uppercase text-xl text-white text-glow">
                  NUG<span className="text-emerald-500">_</span>HUB
               </div>
             </div>
             
             {/* Sub-Header Widgets */}
             <div className="flex items-center gap-4">
                <SystemClock />
                <button 
                  onClick={toggleFullscreen}
                  className="w-10 h-10 rounded bg-black/50 border border-emerald-500/20 text-emerald-500 hover:bg-emerald-500 hover:text-black transition-colors flex items-center justify-center">
                  <i className={`fa-solid ${isFullscreen ? 'fa-compress' : 'fa-expand'}`}></i>
                </button>
             </div>
          </header>

          {/* MAIN LAYOUT */}
          <div className="flex flex-col lg:flex-row gap-6 flex-1 min-h-0">
            
            {/* SIDEBAR NAVIGATION */}
            <aside className="w-full lg:w-64 shrink-0 flex flex-col gap-2">
              <nav className="flex flex-row lg:flex-col gap-2 overflow-x-auto no-scrollbar pb-2 lg:pb-0">
                {tabs.map(tab => (
                  <button 
                    key={tab.id} 
                    onClick={() => setActiveTab(tab.id)} 
                    className={`flex items-center gap-4 px-5 py-4 rounded-lg text-[11px] font-bold uppercase tracking-widest transition-all shrink-0 ${activeTab === tab.id ? 'active-tab' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5 border-l-4 border-transparent'}`}>
                    <i className={`fa-solid ${tab.icon} w-4 text-center`}></i> {tab.label}
                  </button>
                ))}
              </nav>
              
              <div className="mt-auto hidden lg:block p-4 border border-white/5 rounded-xl bg-black/40 text-center">
                <div className="text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-2">Network Uplink</div>
                <div className="flex items-center justify-center gap-2 text-emerald-500 text-xs font-bold">
                  <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                  STABLE
                </div>
              </div>
            </aside>

            {/* CONTENT AREA */}
            <main className="flex-1 hub-panel rounded-2xl p-6 lg:p-12 relative flex flex-col h-full overflow-hidden">
              {renderContent()}
            </main>
          </div>

          {/* PROFESSIONAL FOOTER */}
          <footer className="mt-6 border-t border-white/5 pt-4 flex flex-col md:flex-row justify-between items-center px-4 text-[10px] font-mono text-slate-500 uppercase tracking-widest shrink-0 gap-4">
            <div className="flex items-center gap-3 text-emerald-500/50">
               <i className="fa-brands fa-github text-sm"></i>
               <span>King_Nugget_AU // Centralized Codebase</span>
            </div>
            <div className="flex gap-6">
                <span>Est. 2026</span>
                <span className="hidden md:inline">|</span>
                <span>All Systems Nominal</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
