    const MAX_MAGNITUDE = 1e300;
    const MAX_PROCEDURAL_CHOICES = 48;

    // --- MATHEMATICAL DILATION FOR 10-YEAR LIFESPAN (Harsher Curves) ---
    const sanitizeNumber = (value, fallback = 0, min = -MAX_MAGNITUDE, max = MAX_MAGNITUDE) => {
        const num = Number(value);
        if (!Number.isFinite(num) || Number.isNaN(num)) return fallback;
        return Math.min(max, Math.max(min, num));
    };

    const sanitizeWhole = (value, fallback = 0, min = 0, max = Number.MAX_SAFE_INTEGER) => {
        return Math.floor(sanitizeNumber(value, fallback, min, max));
    };

    const safePow = (base, exponent, fallback = MAX_MAGNITUDE) => {
        const result = Math.pow(sanitizeNumber(base, 0), sanitizeNumber(exponent, 0));
        return Number.isFinite(result) && !Number.isNaN(result) ? Math.min(fallback, result) : fallback;
    };

    const safeMultiply = (...values) => {
        return values.reduce((acc, value) => {
            const next = acc * sanitizeNumber(value, 0);
            return Number.isFinite(next) && !Number.isNaN(next) ? Math.min(MAX_MAGNITUDE, Math.max(-MAX_MAGNITUDE, next)) : (next < 0 ? -MAX_MAGNITUDE : MAX_MAGNITUDE);
        }, 1);
    };

    const applyDilation = (val) => {
        val = sanitizeNumber(val, 0);
        if (val <= 1e12) return val;
        let dilated = val;
        if (dilated > 1e12) dilated = safeMultiply(1e12, safePow(dilated / 1e12, 0.85)); 
        if (dilated > 1e24) dilated = safeMultiply(1e24, safePow(dilated / 1e24, 0.70)); 
        if (dilated > 1e40) dilated = safeMultiply(1e40, safePow(dilated / 1e40, 0.50)); 
        if (dilated > 1e60) dilated = safeMultiply(1e60, safePow(dilated / 1e60, 0.30)); 
        if (dilated > 1e100) dilated = safeMultiply(1e100, safePow(dilated / 1e100, 0.15)); 
        return sanitizeNumber(dilated, MAX_MAGNITUDE);
    };

    const getDilationSeverity = (val) => {
        if (val > 1e100) return "ABYSSAL (85% Output Loss)";
        if (val > 1e60) return "EXTREME (70% Output Loss)";
        if (val > 1e40) return "SEVERE (50% Output Loss)";
        if (val > 1e24) return "HIGH (30% Output Loss)";
        if (val > 1e12) return "MODERATE (15% Output Loss)";
        return "NONE (Systems Optimal)";
    };

    const safeAdd = (currentValue, amountToAdd, min = -MAX_MAGNITUDE, max = MAX_MAGNITUDE) => {
        const result = sanitizeNumber(currentValue, 0, min, max) + sanitizeNumber(amountToAdd, 0, min, max);
        return Number.isFinite(result) && !Number.isNaN(result) ? Math.min(max, Math.max(min, result)) : sanitizeNumber(currentValue, 0, min, max);

    const MILESTONE_THRESHOLDS = [10, 25, 50, 100, 250, 500, 1000, 2500, 5000];

    const formatNumber = (num, notation = 'standard') => {
      if (num === 0 || !num || isNaN(num) || !isFinite(num)) return "0";
      const isNeg = num < 0;
      const absNum = Math.abs(num);
      let result = "";
      if (absNum < 1000) result = (absNum % 1 !== 0) ? absNum.toFixed(1) : Math.floor(absNum).toString();
      else if (notation === 'scientific' || absNum >= 1e63) {
        result = absNum.toExponential(2).replace('e+', 'e');
      } else {
        const suffixes = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td", "Qad", "Qid", "Sxd", "Spd", "Ocd", "Nod", "V"];
        const suffixNum = Math.floor(Math.log10(absNum) / 3);
        let shortValue = absNum / Math.pow(10, suffixNum * 3);
        result = shortValue.toFixed(2) + suffixes[suffixNum];
      }
      return (isNeg ? "-" : "") + result;
    };
    
    const formatCurrency = (num, notation = 'standard') => {
      const isNeg = num < 0;
      return (isNeg ? "-$" : "$") + formatNumber(Math.abs(num), notation);
    };

    const calculateCost = (baseCost, costMult, currentLevel, amount, costCrunchLevel = 0) => {
      const crunchFactor = Math.max(0.5, safePow(0.98, costCrunchLevel, 1));
      const actualMult = sanitizeNumber(costMult * crunchFactor, 1.01, 1.01, 1000);
      if (amount === 1) return sanitizeNumber(safeMultiply(baseCost, safePow(actualMult, currentLevel)), MAX_MAGNITUDE, 0);
      if (actualMult === 1) return sanitizeNumber(baseCost * amount, MAX_MAGNITUDE, 0);
      const result = safeMultiply(baseCost, safePow(actualMult, currentLevel), (safePow(actualMult, amount) - 1) / (actualMult - 1));
      return sanitizeNumber(result, MAX_MAGNITUDE, 0);
    };

    const calculateMaxAffordable = (baseCost, costMult, currentLevel, currency, costCrunchLevel = 0) => {
      const crunchFactor = Math.max(0.5, safePow(0.98, costCrunchLevel, 1));
      const actualMult = sanitizeNumber(costMult * crunchFactor, 1.01, 1.01, 1000);
      if (currency <= 0) return 0;
      const currentCost = sanitizeNumber(safeMultiply(baseCost, safePow(actualMult, currentLevel)), MAX_MAGNITUDE, 0);
      if (currency < currentCost) return 0;
      const result = Math.log((currency * (actualMult - 1)) / Math.max(1, currentCost) + 1) / Math.log(actualMult);
      return sanitizeWhole(result, 0, 0, 1e7);
    };

    const getMilestoneBoost = (count) => {
      const milestoneSteps = [0.05, 0.05, 0.06, 0.06, 0.08, 0.08, 0.1, 0.12, 0.15];
      return MILESTONE_THRESHOLDS.reduce((acc, t, idx) => count >= t ? acc + milestoneSteps[idx] : acc, 1);
    };
    const getNextMilestone = (count) => MILESTONE_THRESHOLDS.find(t => t > count) || null;

    const getRankInfo = (lifetimeCap) => {
      lifetimeCap = sanitizeNumber(lifetimeCap, 0, 0);
      let rIdx = 0;
      for (let i = CORPORATE_RANKS.length - 1; i >= 0; i--) {
        if (lifetimeCap >= CORPORATE_RANKS[i].req) { rIdx = i; break; }
      }
      let current = CORPORATE_RANKS[rIdx];
      let next = CORPORATE_RANKS[rIdx + 1] || null;
      if (!next && lifetimeCap >= current.req) {
        const excess = Math.max(1, lifetimeCap / current.req);
        const infiniteLevel = Math.floor(Math.log10(excess) / 10) + 1; 
        const currentReq = safeMultiply(current.req, safePow(10, (infiniteLevel - 1) * 10));
        const nextReq = safeMultiply(current.req, safePow(10, infiniteLevel * 10));
        const currentMult = safeMultiply(current.mult, safePow(1.18, infiniteLevel - 1)); 
        const nextMult = safeMultiply(current.mult, safePow(1.18, infiniteLevel));
        const logCurrent = Math.log10(currentReq);
        const logNext = Math.log10(nextReq);
        const logLife = Math.log10(Math.max(1, lifetimeCap));
        return {
          current: { name: `Omega Tier ${infiniteLevel}`, req: currentReq, mult: currentMult },
          next: { name: `Omega Tier ${infiniteLevel + 1}`, req: nextReq, mult: nextMult },
          progress: Math.min(100, Math.max(0, ((logLife - logCurrent) / (logNext - logCurrent)) * 100))
        };
      }
      let progress = 100;
      if (next) {
         if (current.req === 0) progress = Math.min(100, (lifetimeCap / next.req) * 100); 
         else {
             const logCurrent = Math.log10(current.req);
             const logNext = Math.log10(next.req);
             const logLife = Math.log10(Math.max(1, lifetimeCap));
             progress = Math.min(100, Math.max(0, ((logLife - logCurrent) / (logNext - logCurrent)) * 100));
         }
      }
      return { current, next, progress };
    };

    const sanitizeRegistry = (registry, baseRegistry, kind) => {
      const source = registry && typeof registry === 'object' ? registry : {};
      return Object.entries(source).reduce((acc, [key, item]) => {
        if (!item || typeof item !== 'object') return acc;
        const isBase = !!baseRegistry[key];
        if (!isBase && !String(key).startsWith('proc_')) return acc;

        if (kind === 'department') {
          if (typeof item.name !== 'string' || typeof item.type !== 'string') return acc;
          acc[key] = {
            id: String(item.id || key),
            name: item.name,
            desc: typeof item.desc === 'string' ? item.desc : 'Procedural construct.',
            baseCost: sanitizeNumber(item.baseCost, 1, 1),
            baseProd: sanitizeNumber(item.baseProd, 0, 0),
            baseUpkeep: sanitizeNumber(item.baseUpkeep || 0, 0, 0),
            costMult: sanitizeNumber(item.costMult, 1.1, 1.01, 500),
            type: item.type === 'data' ? 'data' : 'capital',
            icon: typeof item.icon === 'string' ? item.icon : 'Building'
          };
        } else {
          const baseCostKey = kind === 'prestige' ? 'cost' : 'baseCost';
          if (typeof item.name !== 'string' || typeof item.effectType !== 'string') return acc;
          acc[key] = {
            id: String(item.id || key),
            name: item.name,
            desc: typeof item.desc === 'string' ? item.desc : 'Procedural protocol.',
            [baseCostKey]: sanitizeNumber(item[baseCostKey], 1, 1),
            costMult: sanitizeNumber(item.costMult, 2, 1.01, 1000),
            effectType: item.effectType,

        return acc;
      }, { ...baseRegistry });

    const compactProceduralState = (registry, levels, baseRegistry) => {
      const preserved = new Set(Object.keys(baseRegistry));
      Object.keys(levels).forEach(key => { if ((levels[key] || 0) > 0) preserved.add(key); });

      const recentUnowned = Object.keys(registry)
        .filter(key => String(key).startsWith('proc_') && !preserved.has(key))
        .sort((a, b) => a.localeCompare(b))
        .slice(-MAX_PROCEDURAL_CHOICES);

      recentUnowned.forEach(key => preserved.add(key));

      const compactRegistry = {};
      const compactLevels = {};
      Object.keys(registry).forEach(key => {
        if (!preserved.has(key)) return;
        compactRegistry[key] = registry[key];
        compactLevels[key] = sanitizeWhole(levels[key], 0, 0, 1e7);
      });

      return { registry: compactRegistry, levels: compactLevels };
    };

        departments: departments.levels,
        businessOps,
        policyRegistry: policies.registry,
        policies: policies.levels,
        prestigeRegistry: prestige.registry,
        prestigeUpgrades: prestige.levels,
        stats: sanitizeStats(state.stats),
        settings: {
          notation: state.settings?.notation === 'scientific' ? 'scientific' : 'standard',
          aiManagerOn: state.settings?.aiManagerOn !== false,
          tutorialEnabled: state.settings?.tutorialEnabled !== false,
          dismissedTips: state.settings?.dismissedTips && typeof state.settings.dismissedTips === 'object' ? state.settings.dismissedTips : {}
        },
        autoResearchEnabled: state.autoResearchEnabled !== false,
        researchFocus: ['department', 'policy', 'prestige'].includes(state.researchFocus) ? state.researchFocus : 'department',
        lastTick: Date.now()
      };
    };

    const normalizeSaveData = (parsed) => {
      const departmentRegistry = sanitizeRegistry(parsed.departmentRegistry, INITIAL_DEPARTMENTS, 'department');
      const policyRegistry = sanitizeRegistry(parsed.policyRegistry, INITIAL_POLICIES, 'policy');
      const prestigeRegistry = sanitizeRegistry(parsed.prestigeRegistry, PRESTIGE_UPGRADES, 'prestige');

      return buildSavePayload({
        capital: parsed.capital,
        data: parsed.data,
        influence: parsed.influence,
        marketShare: parsed.marketShare,
        equity: parsed.equity,
        lifetimeCapital: parsed.lifetimeCapital,
        runCapital: parsed.runCapital !== undefined ? parsed.runCapital : parsed.lifetimeCapital,
        buyouts: parsed.buyouts,
        backlog: parsed.backlog,
        hype: parsed.hype,
        totalTime: parsed.totalTime,
        floatingTexts: [],
        departmentRegistry,
        policyRegistry,
        prestigeRegistry,
        departments: sanitizeLevelMap(parsed.departments, departmentRegistry),
        businessOps: sanitizeBusinessOps(parsed.businessOps, departmentRegistry),
        policies: sanitizeLevelMap(parsed.policies, policyRegistry),
        prestigeUpgrades: sanitizeLevelMap(parsed.prestigeUpgrades, prestigeRegistry),
        autoResearchEnabled: parsed.autoResearchEnabled,
        researchFocus: parsed.researchFocus,
        executivePrograms: parsed.executivePrograms || {},
        stats: parsed.stats || {},
        settings: parsed.settings || {},
        buyMultiplier: parsed.buyMultiplier,
        lastTick: parsed.lastTick || Date.now(),
        marketBoom: parsed.marketBoom,
        monopolyBuff: parsed.monopolyBuff
      });
    };

    const isRecognizedSavePayload = (parsed) => {
      if (!parsed || typeof parsed !== 'object') return false;
      const hasCoreNumbers = ['capital', 'data', 'equity', 'lifetimeCapital'].some(key => key in parsed);
      const hasCoreMaps = ['departments', 'policies', 'prestigeUpgrades'].some(key => parsed[key] && typeof parsed[key] === 'object');
      const hasMeta = 'settings' in parsed || 'stats' in parsed || 'buyouts' in parsed;
      return hasCoreNumbers && hasCoreMaps && hasMeta;
    };

    const parseRecognizedSaveString = (raw) => {
      if (typeof raw !== 'string' || !raw.trim()) return null;
      try {
        const parsed = JSON.parse(raw);
        return isRecognizedSavePayload(parsed) ? parsed : null;
      } catch {
        return null;
      }
    };

    const findLegacySaveCandidate = () => {
      for (const key of LEGACY_SAVE_KEYS) {
        const raw = localStorage.getItem(key);
        const parsed = parseRecognizedSaveString(raw);
        if (parsed) return { key, parsed };
      }

      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || key === SAVE_KEY) continue;
        if (!LEGACY_SAVE_PATTERNS.some(pattern => pattern.test(key))) continue;
        const parsed = parseRecognizedSaveString(localStorage.getItem(key));
        if (parsed) return { key, parsed };
      }
      return null;
    };

    const cleanupLegacyLocalSaves = () => {
      try {
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key || key === SAVE_KEY) continue;
          if (!LEGACY_SAVE_PATTERNS.some(pattern => pattern.test(key))) continue;
          const parsed = parseRecognizedSaveString(localStorage.getItem(key));
          if (parsed) keysToRemove.push(key);
        }
        keysToRemove.forEach(key => localStorage.removeItem(key));
      } catch (e) {
        console.error("Failed to clean legacy saves", e);
      }
    };

    function App() {
      const [preBoot, setPreBoot] = useState(true);
      const [isFullscreen, setIsFullscreen] = useState(!!document.fullscreenElement);
      
      const [gameState, setGameState] = useState({
        capital: 0, data: 0, influence: 0, marketShare: 0, equity: 0, lifetimeCapital: 0, runCapital: 0, buyouts: 0,
        backlog: 0, hype: 0, totalTime: 0, floatingTexts: [],
        departmentRegistry: { ...INITIAL_DEPARTMENTS }, policyRegistry: { ...INITIAL_POLICIES }, prestigeRegistry: { ...PRESTIGE_UPGRADES },
        departments: Object.keys(INITIAL_DEPARTMENTS).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}),
        businessOps: buildDefaultBusinessOps(INITIAL_DEPARTMENTS),
        policies: Object.keys(INITIAL_POLICIES).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}),
        prestigeUpgrades: Object.keys(PRESTIGE_UPGRADES).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}),
        autoResearchEnabled: true, researchFocus: 'department', 
        executivePrograms: { ...DEFAULT_EXECUTIVE_PROGRAMS },
        stats: { ...DEFAULT_STATS },
        settings: { notation: 'standard', aiManagerOn: true, tutorialEnabled: true, dismissedTips: {} },
        buyMultiplier: 1, lastTick: Date.now(),
        marketBoom: null, monopolyBuff: { active: false, expiresAt: 0, mult: 1 }
      });

      const stateRef = useRef(gameState);
      useEffect(() => { stateRef.current = gameState; }, [gameState]);

      const [finances, setFinances] = useState({ gross: 0, upkeep: 0, profit: 0, taxRate: 0, taxAmount: 0, net: 0, dataRate: 0, influenceRate: 0, marketShareRate: 0, isBankrupt: false, dilation: 1, backlog: 0, logCap: 50, logSpeed: 2, isStalled: false, hypeBoost: 1, activePrograms: { intelligence: false, lobbying: false, expansion: false } });
      const [isResearching, setIsResearching] = useState(false);
      const [saveNotice, setSaveNotice] = useState("");
      const [mobileTab, setMobileTab] = useState('desk');
      const [strategyTab, setStrategyTab] = useState('stats');
      const [offlineReport, setOfflineReport] = useState(null);
      const [modalState, setModalState] = useState(null); 
      const [bootStage, setBootStage] = useState('prompt');
      const [bootLog, setBootLog] = useState([]);
      
      // FIXED: ImportRef was missing, causing settings tab to crash
      const importRef = useRef(null);
      const clickContainerRef = useRef(null);
      const lastSaveTime = useRef(Date.now());
      const hasProcessedOffline = useRef(false);
      const saveWarningShown = useRef(false);
      const bootStartedRef = useRef(false);
      const launchHandoffRef = useRef((() => {
        try {
          const target = sessionStorage.getItem('axiom_launch_target') || '';
          return {
            active: target.endsWith('0.7.1b.html'),
            preferFullscreen: sessionStorage.getItem('axiom_launch_fullscreen') === '1'
          };
        } catch (e) {
          return { active: false, preferFullscreen: false };
        }
      })());

      const bootSequence = [
        '> AXIOM SYNDICATE UPLINK 0.7.1b',
        '> VERIFYING BROWSER DELIVERY ROUTE... OK',
        '> RESTORING COMPANY RECORDS / ARCHIVE LINK... READY',
        '> MOUNTING DAILY ECONOMY REGISTRIES... READY',
        '> INDEXING HOLDINGS / OPERATIONS / DIRECTIVES... READY',
        '> PREFLIGHTING FULLSCREEN HANDOFF... READY',
        '> LOADING OPERATOR GUIDANCE / LEDGER TRACKING... READY',
        '> PREPARING LONG-RUN COMPANY SIMULATION STATE... READY',
        '> OPERATOR LINK STABLE. TOUCH ANYWHERE TO ENTER.'
      ];

      const initiateConnection = async (requestFs = true) => {
        if (bootStartedRef.current) return;
        bootStartedRef.current = true;
        setBootStage('booting');
        if (requestFs) {
          try { if (!document.fullscreenElement) await document.documentElement.requestFullscreen(); } catch (err) {}
        }
        for (let i = 0; i < bootSequence.length; i++) {
          await new Promise(resolve => setTimeout(resolve, 260 + (i * 80)));
          setBootLog(prev => [...prev, bootSequence[i]]);
        }
        await new Promise(resolve => setTimeout(resolve, 420));
        setBootStage('ready');
        await new Promise(resolve => setTimeout(resolve, 180));
        try {
          sessionStorage.removeItem('axiom_launch_target');
          sessionStorage.removeItem('axiom_launch_fullscreen');
          sessionStorage.removeItem('axiom_launch_version');
        } catch (e) {}
        setPreBoot(false);
      };

      const toggleFullscreen = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen();
        }
      };

      const goToHub = useCallback(() => {
        try {
          localStorage.setItem('nughub_fs_pref', document.fullscreenElement ? 'full' : 'window');
          sessionStorage.setItem('axiom_launch_fullscreen', document.fullscreenElement ? '1' : '0');
          sessionStorage.removeItem('axiom_launch_target');
          sessionStorage.removeItem('axiom_launch_version');
        } catch (e) {}
        window.location.href = CURRENT_HUB_PATH;
      }, []);

      useEffect(() => {
        const handleFSChange = () => setIsFullscreen(!!document.fullscreenElement);
        document.addEventListener('fullscreenchange', handleFSChange);
        return () => document.removeEventListener('fullscreenchange', handleFSChange);
      }, []);

      useEffect(() => {
        if (!launchHandoffRef.current.active) return;
        if (launchHandoffRef.current.preferFullscreen) {
          setBootStage('click_init');
          return;
        }
        const timer = setTimeout(() => {
          initiateConnection(false);
        }, 180);
        return () => clearTimeout(timer);
      }, []);

      useEffect(() => {
        const saved = localStorage.getItem(SAVE_KEY);
        let parsed = parseRecognizedSaveString(saved);

        if (!parsed) {
          const legacyCandidate = findLegacySaveCandidate();
          if (legacyCandidate) {
            parsed = legacyCandidate.parsed;
            localStorage.removeItem(legacyCandidate.key);
          }
        }

        if (parsed) {
          try {
            const normalized = normalizeSaveData(parsed);
            localStorage.setItem(SAVE_KEY, JSON.stringify(normalized));
            cleanupLegacyLocalSaves();
            setGameState(prev => ({ ...prev, ...normalized }));
          } catch (e) { console.error("Failed to load save", e); }
        } else {
            cleanupLegacyLocalSaves();
            hasProcessedOffline.current = true;
        }
      }, []);

      const saveGame = useCallback((manual = false) => {
        try {
          cleanupLegacyLocalSaves();
          const stateToSave = buildSavePayload(stateRef.current);
          localStorage.setItem(SAVE_KEY, JSON.stringify(stateToSave));
          lastSaveTime.current = Date.now();
          saveWarningShown.current = false;
          if (manual) showToast("System Synchronized.");
        } catch (e) {
          console.error("Failed to save", e);
          if (manual || !saveWarningShown.current) {
            showToast("Local save buffer full. Export your memory string.");
            saveWarningShown.current = true;
          }
        }
      }, []);

      const showToast = (msg) => { setSaveNotice(msg); setTimeout(() => setSaveNotice(""), 2000); };

      const calcEffect = useCallback((registry, levels, type, isAdd = false) => {
          return Object.entries(registry).reduce((acc, [key, upg]) => {
              if (upg.effectType === type) {
                  const level = sanitizeWhole(levels[key] || 0, 0, 0, 1e7);
                  const effectBase = sanitizeNumber(upg.effectBase, 0, 0);
                  return isAdd ? safeAdd(acc, level * effectBase) : safeMultiply(acc, safePow(1 + effectBase, level));
              }
              return acc;
          }, isAdd ? 0 : 1);
      }, []);

      const evaluateDepartment = useCallback((dep, amount, currentState) => {
          if (!amount) return { gross: 0, upkeep: 0, data: 0, influence: 0, marketShare: 0 };
          
          const mBoost = getMilestoneBoost(amount);
          const rBoost = getRankInfo(currentState.lifetimeCapital).current.mult;
          const eqBoost = calcEffect(currentState.prestigeRegistry, currentState.prestigeUpgrades, 'global_mult', false);
          const dBoost = applyDilation(1 + (Math.sqrt(currentState.data) * 0.01));
          const capMult = calcEffect(currentState.policyRegistry, currentState.policies, 'capital_mult', false);
          const dataPolEff = calcEffect(currentState.policyRegistry, currentState.policies, 'data_mult', false);
          const ops = currentState.businessOps?.[dep.id] || { staff: 0, quality: 0, management: 0, permitTier: 0, permitExpiresDay: 0 };
          const opDefs = dep.ops || buildBusinessOps(dep.baseCost, {}, dep.type);
          const permitActive = sanitizeNumber(ops.permitExpiresDay, 0, 0) > sanitizeNumber(currentState.totalTime, 0, 0);
          const staffBoost = safePow(1 + (opDefs.staff?.grossBoost || 0.12), sanitizeWhole(ops.staff, 0, 0, 100));
          const qualityBoost = safePow(1 + (opDefs.quality?.grossBoost || 0.08), sanitizeWhole(ops.quality, 0, 0, 100));
          const managementBoost = safePow(1 + (opDefs.management?.grossBoost || 0.05), sanitizeWhole(ops.management, 0, 0, 100));
          const permitBoost = permitActive ? 1 + sanitizeNumber(opDefs.permit?.grossBoost, 0, 0, 5) : 1;
          const dataStaffBoost = safePow(1 + (opDefs.staff?.dataBoost || 0.10), sanitizeWhole(ops.staff, 0, 0, 100));
          const dataQualityBoost = safePow(1 + (opDefs.quality?.dataBoost || 0.08), sanitizeWhole(ops.quality, 0, 0, 100));
          const dataManagementBoost = safePow(1 + (opDefs.management?.dataBoost || 0.05), sanitizeWhole(ops.management, 0, 0, 100));
          const dataPermitBoost = permitActive ? 1 + sanitizeNumber(opDefs.permit?.dataBoost, 0, 0, 5) : 1;
          
          let upkReduc = calcEffect(currentState.policyRegistry, currentState.policies, 'upkeep_reduction', true);
          upkReduc += sanitizeWhole(ops.management, 0, 0, 100) * sanitizeNumber(opDefs.management?.upkeepReduction, 0, 0, 0.5);
          const actualUpkeepRate = Math.max(0.25, 1 - upkReduc);

          let totalMult = safeMultiply(eqBoost, rBoost, mBoost);
          totalMult = applyDilation(totalMult); // Master Dilation

          if (dep.type === 'capital') {
              const operationsUpkeep = safeAdd(
                safeAdd(
                  safeMultiply(sanitizeWhole(ops.staff, 0, 0, 100), opDefs.staff?.upkeepAdd || 0),
                  safeMultiply(sanitizeWhole(ops.quality, 0, 0, 100), opDefs.quality?.upkeepAdd || 0),
                  0
                ),
                permitActive ? sanitizeNumber(opDefs.permit?.dailyFee, 0, 0) : 0,
                0
              );
              return { 
                gross: safeMultiply(amount, dep.baseProd, totalMult, dBoost, capMult, staffBoost, qualityBoost, managementBoost, permitBoost), 
                upkeep: safeAdd(safeMultiply(amount, (dep.baseUpkeep || 0), actualUpkeepRate), operationsUpkeep, 0), 
                data: 0,
                influence: safeMultiply(amount, 0.004 + (dep.baseProd * 0.000004), managementBoost, permitBoost),
                marketShare: safeMultiply(amount, 0.015 + (dep.baseProd * 0.000015), qualityBoost, managementBoost, permitBoost)
              };
          } else {
              const operationsUpkeep = safeAdd(
                safeMultiply(sanitizeWhole(ops.staff, 0, 0, 100), opDefs.staff?.upkeepAdd || 0),
                safeAdd(
                  safeMultiply(sanitizeWhole(ops.quality, 0, 0, 100), opDefs.quality?.upkeepAdd || 0),
                  permitActive ? sanitizeNumber(opDefs.permit?.dailyFee, 0, 0) : 0,
                  0
                ),
                0
              );
              return { 
                gross: 0, upkeep: operationsUpkeep, 
                data: safeMultiply(amount, dep.baseProd, totalMult, dataPolEff, dataStaffBoost, dataQualityBoost, dataManagementBoost, dataPermitBoost),
                influence: safeMultiply(amount, 0.2 + (dep.baseProd * 0.0008), totalMult, dataStaffBoost, dataManagementBoost, dataPermitBoost),
                marketShare: safeMultiply(amount, 0.015 + (dep.baseProd * 0.00008), dataQualityBoost, dataManagementBoost, dataPermitBoost)
              };
          }
      }, [calcEffect]);

      // Core Game Loop
      useEffect(() => {
        let animationFrameId;
        const gameLoop = () => {
          const now = Date.now();
          if (preBoot) {
              animationFrameId = requestAnimationFrame(gameLoop);
              return;
          }

          setGameState(prev => {
            const deltaMs = now - prev.lastTick;
            if (deltaMs < 50) return prev; 
            
            let rawTimeBoost = calcEffect(prev.prestigeRegistry, prev.prestigeUpgrades, 'time_warp', false);
            const timeBoost = applyDilation(rawTimeBoost);

            let realDeltaSec = Math.min(deltaMs, 2592000000) / 1000;
            let simDeltaSec = realDeltaSec * timeBoost;
            let deltaDays = simDeltaSec / DAY_SECONDS;
            
            const newState = { ...prev, lastTick: now };
            newState.stats.timePlayed += realDeltaSec;
            newState.totalTime += deltaDays;

            // Cleanup floating texts
            newState.floatingTexts = newState.floatingTexts.filter(ft => ft.expires > now);
            
            let totalGross = 0, totalUpkeep = 0, totalData = calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'base_data', true);
            let totalInfluence = 0, totalMarketShare = 0;
            let totalUnits = 0;
            
            Object.keys(newState.departmentRegistry).forEach(key => {
                const dep = newState.departmentRegistry[key];
                const amount = newState.departments[key] || 0;
                if (amount > 0) {
                    const evalRes = evaluateDepartment(dep, amount, newState);
                    totalGross = safeAdd(totalGross, evalRes.gross, 0);
                    totalUpkeep = safeAdd(totalUpkeep, evalRes.upkeep, 0);
                    totalData = safeAdd(totalData, evalRes.data, 0);
                    totalInfluence = safeAdd(totalInfluence, evalRes.influence, 0);
                    totalMarketShare = safeAdd(totalMarketShare, evalRes.marketShare, 0);
                    totalUnits = safeAdd(totalUnits, amount, 0);
                }
            });

            if (newState.monopolyBuff.active && now > newState.monopolyBuff.expiresAt) newState.monopolyBuff = { active: false, expiresAt: 0, mult: 1 };
            const activeMonopolyMult = newState.monopolyBuff.active ? newState.monopolyBuff.mult : 1;
            
            totalGross = safeMultiply(totalGross, activeMonopolyMult);
            totalData = safeMultiply(totalData, activeMonopolyMult);
            totalInfluence = safeMultiply(totalInfluence, activeMonopolyMult);
            totalMarketShare = safeMultiply(totalMarketShare, activeMonopolyMult);

            // ---- LOGISTICS & HYPE CALCULATIONS ----
            let logCapMult = calcEffect(newState.policyRegistry, newState.policies, 'log_capacity', false);
            let logSpeedMult = calcEffect(newState.policyRegistry, newState.policies, 'log_speed', false);
            const intelligenceActive = isProgramActive(newState.executivePrograms, 'intelligenceUntil', newState.totalTime);
            const lobbyingActive = isProgramActive(newState.executivePrograms, 'lobbyingUntil', newState.totalTime);
            const expansionActive = isProgramActive(newState.executivePrograms, 'expansionUntil', newState.totalTime);
            if (intelligenceActive) {
              totalData = safeMultiply(totalData, 1.22);
              totalInfluence = safeMultiply(totalInfluence, 1.35);
              logSpeedMult = safeMultiply(logSpeedMult, 1.25);
            }
            if (lobbyingActive) totalInfluence = safeMultiply(totalInfluence, 1.15);
            if (expansionActive) {
              totalGross = safeMultiply(totalGross, 1.18);
              totalMarketShare = safeMultiply(totalMarketShare, 1.25);
            }
            
            let baseLogCap = applyDilation(20 * logCapMult);
            let baseLogSpeed = applyDilation(5 * logSpeedMult);
            let logPressure = safeAdd(safeMultiply(totalUnits, 0.18), safeMultiply(totalGross, 0.00008), 0);

            newState.backlog = safeAdd(newState.backlog, safeMultiply(logPressure, deltaDays) - safeMultiply(baseLogSpeed, deltaDays), 0);
            if (newState.backlog < 0) newState.backlog = 0;

            const isStalled = newState.backlog >= baseLogCap;
            const latencyPenalty = isStalled ? 0.5 : 1.0;

            newState.hype = Math.max(0, newState.hype - (0.35 * deltaDays));
          const hypeBoost = 1 + (newState.hype * 0.08);

            totalGross = safeMultiply(totalGross, hypeBoost, latencyPenalty);
            // -----------------------------------------

            const profitBeforeTax = totalGross - totalUpkeep;
            let effectiveTaxRate = 0;
            
            if (profitBeforeTax > 0) {
                for (let i = TAX_BRACKETS.length - 1; i >= 0; i--) {
                    if (profitBeforeTax >= TAX_BRACKETS[i].threshold) {
                        effectiveTaxRate = TAX_BRACKETS[i].rate;
                        break;
                    }
                }
            }
            
            const evasionDrop = calcEffect(newState.policyRegistry, newState.policies, 'tax_reduction', true) + calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'tax_reduction', true) + (lobbyingActive ? 0.05 : 0);
            effectiveTaxRate = Math.max(0, effectiveTaxRate - evasionDrop);

            const taxAmount = profitBeforeTax > 0 ? safeMultiply(profitBeforeTax, effectiveTaxRate) : 0;
            const netCapitalRate = totalGross - totalUpkeep - taxAmount;
            const isDistressed = newState.capital <= 0 && netCapitalRate < 0;
            const rescueIncome = isDistressed ? Math.max(0.2, safeMultiply(totalGross, 0.01)) : 0;
            const stabilizedNetCapitalRate = isDistressed ? Math.max(rescueIncome, netCapitalRate * 0.2) : netCapitalRate;
            
            const autoClicks = calcEffect(newState.policyRegistry, newState.policies, 'auto_click', true);
            let autoGain = 0;
            if (autoClicks > 0) {
                const basePower = calcEffect(newState.policyRegistry, newState.policies, 'click_power', true);
                const clickSynergy = calcEffect(newState.policyRegistry, newState.policies, 'click_synergy', true);
                const eqBoost = applyDilation(calcEffect(newState.prestigeRegistry, newState.prestigeUpgrades, 'global_mult', false));
                autoGain = safeMultiply((0.1 + basePower + safeMultiply(totalGross, clickSynergy)), eqBoost, activeMonopolyMult, hypeBoost, autoClicks);
            }

            setFinances({
                gross: totalGross, upkeep: totalUpkeep, profit: profitBeforeTax, 
                taxRate: effectiveTaxRate, taxAmount, net: stabilizedNetCapitalRate, 
                dataRate: totalData, influenceRate: totalInfluence, marketShareRate: totalMarketShare, isBankrupt: isDistressed, dilation: applyDilation(1e25) / 1e25,
                backlog: newState.backlog, logCap: baseLogCap, logSpeed: baseLogSpeed,
                isStalled, hypeBoost,
                activePrograms: { intelligence: intelligenceActive, lobbying: lobbyingActive, expansion: expansionActive }
            });

            const tickNet = safeMultiply(stabilizedNetCapitalRate, deltaDays);
            const tickAuto = safeMultiply(autoGain, deltaDays);
            const tickRevenue = safeMultiply(totalGross, deltaDays);
            const tickUpkeep = safeMultiply(totalUpkeep, deltaDays);
            const tickTax = safeMultiply(taxAmount, deltaDays);
            const tickData = safeMultiply(totalData, deltaDays);
            const tickInfluence = safeMultiply(totalInfluence, deltaDays);
            const tickMarketShare = safeMultiply(totalMarketShare, deltaDays);
            const totalCapChange = tickNet + tickAuto;
            
            if (!hasProcessedOffline.current) {
                hasProcessedOffline.current = true;
                if (deltaDays > (1 / 24) && (totalCapChange !== 0 || totalData > 0)) setOfflineReport({ time: deltaDays, capital: totalCapChange, data: tickData });
            }

            if (totalCapChange !== 0) { 
                newState.capital = safeAdd(newState.capital, totalCapChange); 
                if (newState.capital < 0) newState.capital = 0; 
                if (totalCapChange > 0) {
                    newState.lifetimeCapital = safeAdd(newState.lifetimeCapital, totalCapChange); 
                    newState.runCapital = safeAdd(newState.runCapital, totalCapChange); 
                }
            }

            if (tickData > 0) newState.data = safeAdd(newState.data, tickData, 0);
            if (tickInfluence > 0) newState.influence = safeAdd(newState.influence, tickInfluence, 0);
            if (tickMarketShare > 0) newState.marketShare = safeAdd(newState.marketShare, tickMarketShare, 0);

            newState.stats = {
              ...newState.stats,
              totalRevenue: safeAdd(newState.stats.totalRevenue, safeAdd(tickRevenue, tickAuto, 0), 0),
              totalNetCapital: totalCapChange > 0 ? safeAdd(newState.stats.totalNetCapital, totalCapChange, 0) : newState.stats.totalNetCapital,
              totalAutoIncome: tickAuto > 0 ? safeAdd(newState.stats.totalAutoIncome, tickAuto, 0) : newState.stats.totalAutoIncome,
              totalTaxesPaid: tickTax > 0 ? safeAdd(newState.stats.totalTaxesPaid, tickTax, 0) : newState.stats.totalTaxesPaid,
              totalUpkeepPaid: tickUpkeep > 0 ? safeAdd(newState.stats.totalUpkeepPaid, tickUpkeep, 0) : newState.stats.totalUpkeepPaid,
              totalDataHarvested: tickData > 0 ? safeAdd(newState.stats.totalDataHarvested, tickData, 0) : newState.stats.totalDataHarvested,
              totalInfluenceEarned: tickInfluence > 0 ? safeAdd(newState.stats.totalInfluenceEarned, tickInfluence, 0) : newState.stats.totalInfluenceEarned,
              totalMarketShareEarned: tickMarketShare > 0 ? safeAdd(newState.stats.totalMarketShareEarned, tickMarketShare, 0) : newState.stats.totalMarketShareEarned,
              highestCapital: Math.max(sanitizeNumber(newState.stats.highestCapital, 0, 0), sanitizeNumber(newState.capital, 0, 0)),
              highestDailyNet: Math.max(sanitizeNumber(newState.stats.highestDailyNet, 0), sanitizeNumber(stabilizedNetCapitalRate, 0)),
              highestData: Math.max(sanitizeNumber(newState.stats.highestData, 0, 0), sanitizeNumber(newState.data, 0, 0)),
              highestInfluence: Math.max(sanitizeNumber(newState.stats.highestInfluence, 0, 0), sanitizeNumber(newState.influence, 0, 0)),
              highestMarketShare: Math.max(sanitizeNumber(newState.stats.highestMarketShare, 0, 0), sanitizeNumber(newState.marketShare, 0, 0))
            };
            
            if (!newState.marketBoom && Math.random() < (0.03 * deltaDays)) { 
              const r = Math.random();
              newState.marketBoom = { 
                x: Math.floor(Math.random() * 80) + 10, y: Math.floor(Math.random() * 80) + 10, 
                expiresAt: now + 15000, type: r > 0.90 && newState.data > 0 ? 'monopoly' : r > 0.65 && newState.data > 0 ? 'data' : 'cash' 
              };
            }
            if (newState.marketBoom && now > newState.marketBoom.expiresAt) newState.marketBoom = null;
            
            if (newState.policies.aiManager > 0 && newState.settings.aiManagerOn && Math.random() < (0.8 * deltaDays)) {
               const drift = newState.prestigeUpgrades.bailouts || 0;
               let bestBuy = null;
               Object.keys(newState.departmentRegistry).forEach(key => {
                   const dep = newState.departmentRegistry[key];
                   const count = newState.departments[key] || 0;
                   const cost = calculateCost(dep.baseCost, dep.costMult, count, 1, drift);
                   const testEval = evaluateDepartment(dep, count + 1, newState);
                   const isSafe = (totalUpkeep + testEval.upkeep) < (totalGross * 0.8) || dep.type === 'data';
                   if (newState.capital >= cost && isSafe) { if (!bestBuy || cost > bestBuy.cost) bestBuy = { key, cost }; }
               });
               if (bestBuy) { newState.capital -= bestBuy.cost; newState.departments[bestBuy.key] = (newState.departments[bestBuy.key] || 0) + 1; }
            }

            if (now - lastSaveTime.current > 10000) {
               try {
                 cleanupLegacyLocalSaves();
                 localStorage.setItem(SAVE_KEY, JSON.stringify(buildSavePayload(newState)));
                 lastSaveTime.current = now;
                 saveWarningShown.current = false;
               } catch (e) {
                 console.error("Autosave failed", e);
                 if (!saveWarningShown.current) {
                   showToast("Autosave buffer full. Export your memory string.");
                   saveWarningShown.current = true;
                 }
               }
            }

            return newState;
          });
          animationFrameId = requestAnimationFrame(gameLoop);
        };
        animationFrameId = requestAnimationFrame(gameLoop);
        return () => cancelAnimationFrame(animationFrameId);
      }, [calcEffect, evaluateDepartment, preBoot]);

      // Calendar Formatting
      const calendar = useMemo(() => {
        const days = Math.floor(gameState.totalTime);
        const year = Math.floor(days / 365) + 1;
        const dayOfYear = (days % 365) + 1;
        
        const totalSeconds = gameState.totalTime * 86400;
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = Math.floor(totalSeconds % 60);
        
        return { year, dayOfYear, hours, minutes, seconds };
      }, [gameState.totalTime]);

      const triggerBuyAction = useCallback((type, key) => {
        setGameState(prev => {
          let cost, canAfford = false, amountToBuy = prev.buyMultiplier;
          const drift = prev.prestigeUpgrades.bailouts || 0;
          let nextState = { ...prev };
          
          if (type === 'department') {
            const dep = prev.departmentRegistry[key];
            const currentLevel = prev.departments[key] || 0;
            const currency = prev.capital; 
            if (amountToBuy === -1) amountToBuy = calculateMaxAffordable(dep.baseCost, dep.costMult, currentLevel, currency, drift);
            if (amountToBuy <= 0) return prev;
            cost = calculateCost(dep.baseCost, dep.costMult, currentLevel, amountToBuy, drift);
            canAfford = currency >= cost;
            if (canAfford) {
              nextState.capital = prev.capital - cost;
              nextState.departments = { ...prev.departments, [key]: currentLevel + amountToBuy };
              nextState.stats = {
                ...prev.stats,
                totalSpent: safeAdd(prev.stats.totalSpent, cost, 0),
                totalBusinessesPurchased: prev.stats.totalBusinessesPurchased + amountToBuy
              };
            }
          } else {
            const isPrestige = type === 'prestige';
            const upgDef = isPrestige ? prev.prestigeRegistry[key] : prev.policyRegistry[key];
            const currentLevel = isPrestige ? (prev.prestigeUpgrades[key] || 0) : (prev.policies[key] || 0);
            cost = calculateCost(isPrestige ? upgDef.cost : upgDef.baseCost, upgDef.costMult, currentLevel, 1, isPrestige ? 0 : drift);
            canAfford = (isPrestige ? prev.equity : prev.capital) >= cost;
            if (canAfford) {
              nextState.capital = isPrestige ? prev.capital : prev.capital - cost;
              nextState.equity = isPrestige ? prev.equity - cost : prev.equity;
              if (isPrestige) nextState.prestigeUpgrades = { ...prev.prestigeUpgrades, [key]: currentLevel + 1 };
              else nextState.policies = { ...prev.policies, [key]: currentLevel + 1 };
              nextState.stats = {
                ...prev.stats,
                totalSpent: safeAdd(prev.stats.totalSpent, cost, 0),
                totalPrestigeBought: isPrestige ? prev.stats.totalPrestigeBought + 1 : prev.stats.totalPrestigeBought,
                totalPoliciesBought: isPrestige ? prev.stats.totalPoliciesBought : prev.stats.totalPoliciesBought + 1
              };
            }
          }
          if (!canAfford && activeHoldRef.current) endHoldBuy();
          return canAfford ? nextState : prev;
        });
      }, []);

      const triggerBusinessOperation = useCallback((key, opKey) => {
        setGameState(prev => {
          const dep = prev.departmentRegistry[key];
          if (!dep || (prev.departments[key] || 0) <= 0) return prev;

          const defs = dep.ops || buildBusinessOps(dep.baseCost, {}, dep.type);
          const ops = prev.businessOps?.[key] || { staff: 0, quality: 0, management: 0, permitTier: 0, permitExpiresDay: 0 };

          let currentLevel = 0;
          if (opKey === 'permit') currentLevel = sanitizeWhole(ops.permitTier, 0, 0, 1000);
          else currentLevel = sanitizeWhole(ops[opKey], 0, 0, 100);

          const opDef = defs[opKey];
          const cost = calculateCost(opDef.baseCost, opDef.costMult, currentLevel, 1, prev.prestigeUpgrades.bailouts || 0);
          if (prev.capital < cost) return prev;

          const nextOps = { ...ops };
          if (opKey === 'permit') {
            nextOps.permitTier = currentLevel + 1;
            nextOps.permitExpiresDay = sanitizeNumber(prev.totalTime, 0, 0) + sanitizeNumber(opDef.durationDays, 7, 1);
          } else {
            nextOps[opKey] = currentLevel + 1;
          }

          return {
            ...prev,
            capital: prev.capital - cost,
            businessOps: { ...(prev.businessOps || {}), [key]: nextOps },
            stats: {
              ...prev.stats,
              totalSpent: safeAdd(prev.stats.totalSpent, cost, 0),
              totalOperationsBought: prev.stats.totalOperationsBought + 1
            }
          };
        });
      }, []);

      const triggerDirective = useCallback((directiveKey) => {
        setGameState(prev => {
          const costs = getDirectiveCosts(prev);
          const nextPrograms = { ...(prev.executivePrograms || DEFAULT_EXECUTIVE_PROGRAMS) };
          const nextState = { ...prev, executivePrograms: nextPrograms };

          if (directiveKey === 'intelligence') {
            if (prev.data < costs.intelligence) return prev;
            nextState.data = prev.data - costs.intelligence;
            nextPrograms.intelligenceUntil = sanitizeNumber(prev.totalTime, 0, 0) + 14;
            nextState.backlog = Math.max(0, prev.backlog - 25);
            nextState.stats = { ...prev.stats, totalDirectivesActivated: prev.stats.totalDirectivesActivated + 1 };
            showToast('Intelligence brief deployed.');
            return nextState;
          }

          if (directiveKey === 'lobbying') {
            if (prev.influence < costs.lobbying) return prev;
            nextState.influence = prev.influence - costs.lobbying;
            nextPrograms.lobbyingUntil = sanitizeNumber(prev.totalTime, 0, 0) + 12;
            nextState.stats = { ...prev.stats, totalDirectivesActivated: prev.stats.totalDirectivesActivated + 1 };
            showToast('Lobbying drive activated.');
            return nextState;
          }

          if (directiveKey === 'expansion') {
            if (prev.marketShare < costs.expansion) return prev;
            nextState.marketShare = prev.marketShare - costs.expansion;
            nextPrograms.expansionUntil = sanitizeNumber(prev.totalTime, 0, 0) + 10;
            nextState.hype = Math.min(5, prev.hype + 0.8);
            nextState.stats = { ...prev.stats, totalDirectivesActivated: prev.stats.totalDirectivesActivated + 1 };
            showToast('Expansion push launched.');
            return nextState;
          }

          return prev;
        });
      }, []);

      const activeHoldRef = useRef(null);
      const holdTimerRef = useRef(null);
      
      const startHoldBuy = useCallback((type, key, e) => {
        if (e && e.cancelable) e.preventDefault(); 
        triggerBuyAction(type, key); 
        activeHoldRef.current = { type, key, delay: 350, isHolding: true }; 
        const loop = () => {
          if (!activeHoldRef.current?.isHolding) return;
          triggerBuyAction(activeHoldRef.current.type, activeHoldRef.current.key);
          activeHoldRef.current.delay = Math.max(40, activeHoldRef.current.delay * 0.75); 
          holdTimerRef.current = setTimeout(loop, activeHoldRef.current.delay);
        };
        if (holdTimerRef.current) clearTimeout(holdTimerRef.current);
        holdTimerRef.current = setTimeout(loop, activeHoldRef.current.delay);
      }, [triggerBuyAction]);

      const endHoldBuy = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault();
        if (activeHoldRef.current) activeHoldRef.current.isHolding = false;
        if (holdTimerRef.current) clearTimeout(holdTimerRef.current);
      }, []);

      const handleManualClick = useCallback((cx, cy) => {
        setGameState(prev => {
          const activeMonopolyMult = prev.monopolyBuff.active ? prev.monopolyBuff.mult : 1;
          const clickSynergy = calcEffect(prev.policyRegistry, prev.policies, 'click_synergy', true);
          const basePower = calcEffect(prev.policyRegistry, prev.policies, 'click_power', true);
          const eqBoost = applyDilation(calcEffect(prev.prestigeRegistry, prev.prestigeUpgrades, 'global_mult', false));
          const logCapMult = calcEffect(prev.policyRegistry, prev.policies, 'log_capacity', false);
          
          let grossBase = 0;
          Object.keys(prev.departmentRegistry).forEach(key => {
              if (prev.departmentRegistry[key].type === 'capital') {
                  grossBase = safeAdd(grossBase, evaluateDepartment(prev.departmentRegistry[key], prev.departments[key] || 0, prev).gross, 0);
              }
          });

          const localHypeBoost = 1 + (prev.hype * 0.08);
          const isDistressed = prev.capital <= 0;
          const recoveryBoost = isDistressed ? 4 : 1; 
          const gain = safeMultiply((1 + basePower + safeMultiply(grossBase, clickSynergy, 0.01)), eqBoost, activeMonopolyMult, localHypeBoost, recoveryBoost);

          // Hands on mechanics
          let nextBacklog = Math.max(0, prev.backlog - (applyDilation(20 * logCapMult) * 0.12));
          let nextHype = Math.min(5, prev.hype + 0.12);

          let newFloatingTexts = [...prev.floatingTexts];
          if (clickContainerRef.current && cx !== undefined && cy !== undefined) {
            const rect = clickContainerRef.current.getBoundingClientRect();
            newFloatingTexts.push({ id: Date.now() + Math.random(), x: cx - rect.left, y: cy - rect.top, text: `+${formatCurrency(gain, prev.settings.notation)}`, colorCode: 'emerald', expires: Date.now() + 1000 });
            if (newFloatingTexts.length > 25) newFloatingTexts.shift();
          }

          return { 
              ...prev, 
              capital: safeAdd(prev.capital, gain), 
              lifetimeCapital: safeAdd(prev.lifetimeCapital, gain), 
              runCapital: safeAdd(prev.runCapital, gain), 
              stats: {
                ...prev.stats,
                totalClicks: prev.stats.totalClicks + 1,
                totalRevenue: safeAdd(prev.stats.totalRevenue, gain, 0),
                totalNetCapital: safeAdd(prev.stats.totalNetCapital, gain, 0),
                totalManualIncome: safeAdd(prev.stats.totalManualIncome, gain, 0),
                highestCapital: Math.max(sanitizeNumber(prev.stats.highestCapital, 0, 0), safeAdd(prev.capital, gain))
              },
              backlog: nextBacklog,
              hype: nextHype,
              floatingTexts: newFloatingTexts
          };
        });
      }, [calcEffect, evaluateDepartment]);

      const activeClickHoldRef = useRef(null);
      const clickTimerRef = useRef(null);
      
      const startHoldClick = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault(); 
        const cx = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : window.innerWidth / 2);
        const cy = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : window.innerHeight / 2);
        
        const currentRefState = stateRef.current;
        const speedReduction = calcEffect(currentRefState.policyRegistry, currentRefState.policies, 'click_speed', true);
        const minDelay = Math.max(30, 250 - speedReduction); 
        
        activeClickHoldRef.current = { delay: 400, minDelay, cx, cy, isHolding: true }; 
        const loop = () => {
            if (!activeClickHoldRef.current?.isHolding) return;
            handleManualClick(activeClickHoldRef.current.cx, activeClickHoldRef.current.cy);
            activeClickHoldRef.current.delay = Math.max(activeClickHoldRef.current.minDelay, activeClickHoldRef.current.delay * 0.85);
            clickTimerRef.current = setTimeout(loop, activeClickHoldRef.current.delay);
        };
        
        if (clickTimerRef.current) clearTimeout(clickTimerRef.current);
        handleManualClick(cx, cy); 
        clickTimerRef.current = setTimeout(loop, activeClickHoldRef.current.delay);
      }, [calcEffect, handleManualClick]);

      const endHoldClick = useCallback((e) => {
        if (e && e.cancelable) e.preventDefault();
        if (activeClickHoldRef.current) activeClickHoldRef.current.isHolding = false;
        if (clickTimerRef.current) clearTimeout(clickTimerRef.current);
      }, []);

      useEffect(() => { 
        const handleBlur = () => { endHoldBuy(); endHoldClick(); };
        const handleVisibilityChange = () => { if (document.hidden) handleBlur(); };
        window.addEventListener('blur', handleBlur);
        document.addEventListener('visibilitychange', handleVisibilityChange);
        return () => { 
            endHoldBuy(); endHoldClick();
            window.removeEventListener('blur', handleBlur);
            document.removeEventListener('visibilitychange', handleVisibilityChange);
        }; 
      }, [endHoldBuy, endHoldClick]);

      const handleBoomClick = () => {
        setGameState(prev => {
          if (!prev.marketBoom) return prev;
          const type = prev.marketBoom.type;
          const newState = { ...prev, marketBoom: null, stats: { ...prev.stats, marketBooms: prev.stats.marketBooms + 1 } };
          
          let newFloatingTexts = [...prev.floatingTexts];
          if (type === 'cash') {
            const reward = Math.max(20, safeMultiply(finances.gross, 0.35));
            newFloatingTexts.push({ id: Date.now(), x: window.innerWidth/2, y: window.innerHeight/2, text: `+${formatCurrency(reward, prev.settings.notation)} Extraction!`, colorCode: 'emerald', expires: Date.now()+1500 });
            newState.capital = safeAdd(newState.capital, reward); 
            newState.lifetimeCapital = safeAdd(newState.lifetimeCapital, reward); 
            newState.runCapital = safeAdd(newState.runCapital, reward);
            newState.stats = {
              ...newState.stats,
              totalRevenue: safeAdd(newState.stats.totalRevenue, reward, 0),
              totalNetCapital: safeAdd(newState.stats.totalNetCapital, reward, 0),
              highestCapital: Math.max(sanitizeNumber(newState.stats.highestCapital, 0, 0), sanitizeNumber(newState.capital, 0, 0))
            };
          } else if (type === 'data') {
            const reward = Math.max(2, safeMultiply(finances.dataRate, 0.3));
            newFloatingTexts.push({ id: Date.now(), x: window.innerWidth/2, y: window.innerHeight/2, text: `+${formatNumber(reward, prev.settings.notation)} Data Breach!`, colorCode: 'cyan', expires: Date.now()+1500 });
            newState.data = safeAdd(newState.data, reward);
            newState.stats = {
              ...newState.stats,
              totalDataHarvested: safeAdd(newState.stats.totalDataHarvested, reward, 0)
            };
          } else if (type === 'monopoly') {
            newFloatingTexts.push({ id: Date.now(), x: window.innerWidth/2, y: window.innerHeight/2, text: `x1.6 SYSTEM OVERRIDE`, colorCode: 'amber', expires: Date.now()+1500 });
            newState.monopolyBuff = { active: true, expiresAt: Date.now() + 15000, mult: 1.6 };
          }
          newState.floatingTexts = newFloatingTexts;
          return newState;
        });
      };

      const procStats = useMemo(() => ({
        deps: Object.keys(gameState.departmentRegistry).filter(k => k.startsWith('proc_')).length,
        pols: Object.keys(gameState.policyRegistry).filter(k => k.startsWith('proc_')).length,
        pres: Object.keys(gameState.prestigeRegistry).filter(k => k.startsWith('proc_')).length,
      }), [gameState.departmentRegistry, gameState.policyRegistry, gameState.prestigeRegistry]);

      const researchUnlocked = useMemo(() => {
        return ((gameState.departments.research || 0) > 0 && gameState.lifetimeCapital >= 1e8) ||
          ((gameState.departments.datacenter || 0) > 0) ||
          ((gameState.departments.platform || 0) > 0);
      }, [gameState.departments, gameState.lifetimeCapital]);

      const getResearchCost = useCallback(() => {
        if (!researchUnlocked) return { type: 'data', amount: MAX_MAGNITUDE };
        const aiReducSum = calcEffect(gameState.policyRegistry, gameState.policies, 'ai_cost_reduction', true) + calcEffect(gameState.prestigeRegistry, gameState.prestigeUpgrades, 'ai_cost_reduction', true);
        const discountMult = Math.max(0.01, 1 - aiReducSum); 
        if (gameState.researchFocus === 'department') return { type: 'data', amount: safeMultiply(8e11, safePow(1200, procStats.deps), discountMult) };
        if (gameState.researchFocus === 'policy') return { type: 'data', amount: safeMultiply(2.5e12, safePow(1400, procStats.pols), discountMult) };
        return { type: 'equity', amount: sanitizeWhole(safeMultiply(40, safePow(12, procStats.pres)), 40, 1) };
      }, [gameState.researchFocus, gameState.policyRegistry, gameState.prestigeRegistry, gameState.prestigeUpgrades, gameState.policies, calcEffect, procStats, researchUnlocked]);

      const executeResearch = useCallback(async () => {
        if (isResearching || !gameState.autoResearchEnabled || !researchUnlocked) return;
        const cost = getResearchCost();
        if ((cost.type === 'data' && gameState.data < cost.amount) || (cost.type === 'equity' && gameState.equity < cost.amount)) return;
        
        setIsResearching(true);
        setGameState(prev => ({ ...prev, data: cost.type === 'data' ? Math.max(0, prev.data - cost.amount) : prev.data, equity: cost.type === 'equity' ? Math.max(0, prev.equity - cost.amount) : prev.equity }));
        
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        const prefixes = ["Global", "Synergistic", "Dynamic", "Apex", "Prime", "Quantum", "Vanguard", "Omni", "Hyper", "Neo", "Cosmic", "Stellar", "Astral", "Ethereal", "Hegemonic"];
        const id = `proc_${Date.now()}_${Math.floor(Math.random()*1000)}`;
        let newItem;
        
        if (gameState.researchFocus === 'department') {
          const isData = procStats.deps % 2 !== 0; 
          newItem = {
            id, name: `${prefixes[Math.floor(Math.random() * prefixes.length)]} ${isData ? 'Sub-Network' : 'Subsidiary'}`,
            desc: `Tier ${procStats.deps + 1} Artificial Construct.`, 
            baseCost: safeMultiply(100e24, safePow(1e6, procStats.deps)), 
            baseProd: safeMultiply(5e15, safePow(1e4, procStats.deps)),
            baseUpkeep: isData ? 0 : safeMultiply(4e15, safePow(1e4, procStats.deps)),
            costMult: 1.85 + (Math.random() * 0.15), type: isData ? 'data' : 'capital', icon: isData ? 'Network' : 'Building',
            ops: buildBusinessOps(safeMultiply(100e24, safePow(1e6, procStats.deps)), {
              permitName: isData ? 'Temporary Market Access' : 'Expansion Permit',
              staffName: isData ? 'Ops Analysts' : 'Operations Crew',
              qualityName: isData ? 'Model Refinement' : 'Process Tuning',
              managementName: isData ? 'Systems Governance' : 'Site Director'
            }, isData ? 'data' : 'capital')
          };
        } else if (gameState.researchFocus === 'policy') {
          const r = Math.random();
          const eType = r > 0.8 ? 'tax_reduction' : r > 0.6 ? 'upkeep_reduction' : r > 0.4 ? 'log_capacity' : r > 0.2 ? 'log_speed' : 'capital_mult';
          newItem = {
            id, name: `${prefixes[Math.floor(Math.random() * prefixes.length)]} Protocol`, desc: `Tier ${procStats.pols + 1} System Override.`, 
            baseCost: safeMultiply(500e24, safePow(1e6, procStats.pols)), costMult: 15 + Math.random() * 5,
            effectType: eType, effectBase: (eType === 'capital_mult' || eType.startsWith('log_')) ? 0.08 * (procStats.pols + 1) : 0.005
          };
        } else {
          newItem = {
            id, name: `${prefixes[Math.floor(Math.random() * prefixes.length)]} Reality Shift`, desc: `Tier ${procStats.pres + 1} Dimensional Hegemony.`, 
            cost: safeMultiply(50, safePow(10, procStats.pres)), costMult: 8 + Math.random() * 4,
            effectType: 'global_mult', effectBase: 0.06 * (procStats.pres + 1)
          };
        }
        
        setGameState(prev => {
          if (prev.researchFocus === 'department') {
            const compacted = compactProceduralState({ ...prev.departmentRegistry, [newItem.id]: newItem }, { ...prev.departments, [newItem.id]: 0 }, INITIAL_DEPARTMENTS);
            return {
              ...prev,
              departmentRegistry: compacted.registry,
              departments: compacted.levels,
              businessOps: sanitizeBusinessOps({ ...prev.businessOps, [newItem.id]: { staff: 0, quality: 0, management: 0, permitTier: 0, permitExpiresDay: 0 } }, compacted.registry),
              stats: { ...prev.stats, totalResearchProjects: prev.stats.totalResearchProjects + 1 }
            };
          }
          if (prev.researchFocus === 'policy') {
            const compacted = compactProceduralState({ ...prev.policyRegistry, [newItem.id]: newItem }, { ...prev.policies, [newItem.id]: 0 }, INITIAL_POLICIES);
            return { ...prev, policyRegistry: compacted.registry, policies: compacted.levels, stats: { ...prev.stats, totalResearchProjects: prev.stats.totalResearchProjects + 1 } };
          }
          if (prev.researchFocus === 'prestige') {
            const compacted = compactProceduralState({ ...prev.prestigeRegistry, [newItem.id]: newItem }, { ...prev.prestigeUpgrades, [newItem.id]: 0 }, PRESTIGE_UPGRADES);
            return { ...prev, prestigeRegistry: compacted.registry, prestigeUpgrades: compacted.levels, stats: { ...prev.stats, totalResearchProjects: prev.stats.totalResearchProjects + 1 } };
          }
          return prev;
        });
        setIsResearching(false);
      }, [gameState.autoResearchEnabled, gameState.data, gameState.equity, gameState.researchFocus, getResearchCost, isResearching, procStats, researchUnlocked]);

      useEffect(() => {
        let interval;
        if (researchUnlocked && gameState.autoResearchEnabled && !isResearching) {
          interval = setInterval(() => {
            const cost = getResearchCost();
            if ((cost.type === 'data' && gameState.data >= cost.amount) || (cost.type === 'equity' && gameState.equity >= cost.amount)) executeResearch();
          }, 5000);
        }
        return () => clearInterval(interval);
      }, [gameState.autoResearchEnabled, gameState.data, gameState.equity, getResearchCost, executeResearch, isResearching, researchUnlocked]);

      const calculateBuyoutRewards = () => {
        const baseReq = safeMultiply(5e11, safePow(20000, gameState.buyouts));
        if (gameState.runCapital < baseReq) return 0;
        return sanitizeWhole(safePow(gameState.runCapital / baseReq, 0.11), 0, 0); 
      };

      const getNextBuyoutReq = () => {
        const baseReq = safeMultiply(5e11, safePow(20000, gameState.buyouts));
        const currentRewards = calculateBuyoutRewards();
        return sanitizeNumber(safeMultiply(baseReq, safePow(currentRewards + 1, 1 / 0.11)), MAX_MAGNITUDE, 0); 
      };
      
      const confirmBuyout = () => {
        const rewards = calculateBuyoutRewards();
        setGameState(prev => ({
          ...prev, capital: 0, data: 0, influence: 0, marketShare: 0, runCapital: 0, buyouts: prev.buyouts + 1, equity: safeAdd(prev.equity, rewards), monopolyBuff: { active: false, expiresAt: 0, mult: 1 },
          departments: Object.keys(prev.departmentRegistry).reduce((acc, key) => ({ ...acc, [key]: 0 }), {}),
          businessOps: buildDefaultBusinessOps(prev.departmentRegistry),
